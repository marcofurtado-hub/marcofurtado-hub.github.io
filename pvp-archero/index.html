<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="ad.size" content="width=320,height=480"><title>PvP Archero</title><script src="mraid.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;overflow:hidden;background:#2c4818;font-family:'Arial Black',Impact,sans-serif;color:#fff;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;touch-action:none;cursor:crosshair}@media (hover:none){canvas{cursor:default}}#hud{position:absolute;inset:0;pointer-events:none;z-index:10}#hud .pe{pointer-events:auto}#status-bar{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:2px;font-weight:900;text-shadow:0 2px 0 rgba(0,0,0,.6)}.team-label{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);padding:6px 12px;border-radius:14px}.team-label .dot{width:10px;height:10px;border-radius:50%;display:inline-block}.team-label.you{color:#7be0d8}.team-label.you .dot{background:#7be0d8;box-shadow:0 0 8px #7be0d8}.team-label.rival{color:#d8c840}.team-label.rival .dot{background:#d8c840;box-shadow:0 0 8px #d8c840}#wave-count{position:absolute;top:54px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:3px;color:#ffefd9;text-shadow:0 2px 0 #000;background:rgba(0,0,0,.45);padding:5px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12)}#banner{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:46px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 4px 0 #000,0 0 14px rgba(255,255,255,.4);opacity:0;pointer-events:none}#banner.show{animation:bannerIn 1.4s ease-out forwards}#banner.danger{color:#ff3aaa;text-shadow:0 4px 0 #4a0033,0 0 22px rgba(255,58,170,.7)}#banner.success{color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 22px rgba(123,224,216,.8)}@keyframes bannerIn{0%{opacity:0;transform:translateY(-30px) scale(.7)}20%{opacity:1;transform:translateY(0) scale(1.15)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(.95)}}#touch-ring{position:absolute;width:130px;height:130px;border:2px solid rgba(123,224,216,.55);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%) scale(.6);opacity:0;transition:opacity .14s,transform .14s;background:radial-gradient(circle,rgba(123,224,216,.12) 0,rgba(123,224,216,0) 70%);box-shadow:0 0 14px rgba(123,224,216,.35);z-index:40}#touch-ring.active{opacity:1;transform:translate(-50%,-50%) scale(1)}#touch-ring .dot{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,rgba(123,224,216,.85) 0,rgba(123,224,216,.5) 100%);border:2px solid rgba(255,255,255,.4);transform:translate(-50%,-50%);transition:transform 40ms linear;box-shadow:0 4px 10px rgba(0,0,0,.35)}#joy-hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55);pointer-events:none;text-align:center;background:rgba(0,0,0,.35);padding:10px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.12);white-space:nowrap}#joy-hint .touch-hint{display:none}#joy-hint .kbm-hint{display:inline}@media (hover:none){#joy-hint .touch-hint{display:inline}#joy-hint .kbm-hint{display:none}}#joy-hint.hidden{opacity:0;transition:opacity .4s}#endcard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse at center,rgba(0,0,0,.7) 0,rgba(20,20,20,.95) 100%);padding:24px;z-index:60}#endcard.show{display:flex}#endcard .hd{font-size:52px;letter-spacing:4px;color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 28px rgba(123,224,216,.7);margin-bottom:14px}#endcard.loss .hd{color:#ff3030;text-shadow:0 4px 0 #4a0000,0 0 28px rgba(255,48,48,.7)}#endcard.loss .cta{background:linear-gradient(135deg,#ff3030 0,#a01010 100%);color:#fff;box-shadow:0 0 32px rgba(255,48,48,.6),0 6px 0 #4a0000}#endcard .sub{font-size:18px;color:#ffefd9;margin-bottom:36px;letter-spacing:1px}#endcard .cta{padding:20px 44px;background:linear-gradient(135deg,#7be0d8 0,#3aa8a0 100%);color:#001a18;border:none;font-family:Impact,'Arial Black',sans-serif;font-size:24px;letter-spacing:2px;cursor:pointer;border-radius:14px;box-shadow:0 0 32px rgba(123,224,216,.6),0 6px 0 #003a36;animation:ctapulse 1.2s ease-in-out infinite}@keyframes ctapulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}#endcard .cta-sub{font-size:13px;color:#ffefd9;margin-top:14px;letter-spacing:1px}</style><script>window.__ASSETS__={"bgm_battle.mp3":"data:audio/mpeg;base64,SUQzBAAAAAABBlRYWFgAAAASAAADbWFqb3JfYnJhbmQATTRBIABUWFhYAAAAEwAAA21pbm9yX3ZlcnNpb24ANTEyAFRYWFgAAAAgAAADY29tcGF0aWJsZV9icmFuZHMATTRBIGlzb21pc28yAFRTU0UAAAAPAAADTGF2ZjYyLjEyLjEwMAAAAAAAAAAAAAAA//twAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAABPAABh9QAGCQwPDxMWGRwcHyMmKSksMDM2Njk8Pz9DRklMTE9TVllZXGBjZmZpbG9vc3Z5fHx/g4aJiYyQk5aWmZyfn6Omqaysr7O2ubm8wMPGxsnMz8/T1tnc3N/j5unp7PDz9vb5/P8AAAAATGF2YzYyLjI4AAAAAAAAAAAAAAAAJAVAAAAAAAAAYfVXibTSAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7cEQAAAHhBladGGACO2ALiaEMAYjg01IZooABHJVrFzJQAAASVAAAEEI9nkyZAgQAAAADw8PDwwAAAAADw8eHpAAz/Th4eHhgAAAAgPD3/r/////SAAAI9sPH////h4qtVVSpAIBhYPg4CAIAgCAPg+D4Pg4CBQEAQB8HwfB8HAQBAEAQB8HwfB8HAQBAEAwD4Ph+j/An///+g4LEHFQRWa6dBK2iOOV/OX1X+i2HIXUAcMFY9gBEg9zkh5Q6X76GeX/2///10f//lQwkCrejwMOFyxaba/o22jltzqZ5SP6hwOJBUzpfCCQJcrCcDKLC7aSgk0dqT0iys60EQUyDVAUweHo6kcylL/oZ5f/b///XEv4KgsWOue3LLXe/uG2VfuY1u5NH/3pAXXWau67XV7PV6oagYon/+3JkB4ACezJfbmCgBDpi273GHACKcOt/OMQAAOGO8CcSUABTvJ779dyWwPA8XXVG8MMoRA4dGBRA/uU6h5wcYPkyC7u5B1l5CPP09N2ZzilBR6fT2/iYubzF0p/5T3///1qAABtls1NF4nr2GCwXAAD/0kdHBQXyy4Ihs8fMkwvk8A0ishqQ5hA8
