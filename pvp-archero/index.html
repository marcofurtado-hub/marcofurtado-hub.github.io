<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archero PVP">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Archero PVP</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
    html,body{background:#101013;overflow:hidden;font-family:'Courier New',monospace;color:#ddd;touch-action:none;width:100%;height:100%}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
// ============================================================
// ARCHERO PVP — Core duel
// Cubes only. Grey arena. Blue vs Red. First blood.
// Bullets ricochet up to 2 times.
// ============================================================

const IS_MOBILE = 'ontouchstart' in window || navigator.maxTouchPoints > 1;
const ARENA_W = 10, ARENA_H = 16;
const WALL_T = 0.5, WALL_H = 1.2;
const SPAWN_P = { x: 0, z: 5 };
const SPAWN_E = { x: 0, z: -5 };
const MAX_PROJ = 30, MAX_PARTS = 80;
const MAX_BOUNCES = 2;

const COLORS = {
  bg:        0x101013,
  floor:     0x2a2a2c,
  wall:      0x1a1a1c,
  wallTop:   0x222226,
  cover:     0x202024,
  player:    0x3380ff,  // azul
  playerAcc: 0x66bbff,
  enemy:     0xcc3333,  // vermelho
  enemyAcc:  0xff6666,
  pBullet:   0x4499ff,  // tiro azul
  eBullet:   0xff4444,  // tiro vermelho
  spark:     0x888888,
};

const WEAPON = { rate: 0.3, dmg: 25, spd: 18, spread: 0.02, sz: 0.08 };

// --- GLOBALS ---
let renderer, scene, camera, clock;
let arena, player, enemy, ai;
let projectiles = [], particles = [];
let state = 'menu';
let ui, input;

// ============================================================
// INIT
// ============================================================
function init() {
  const c = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({ canvas: c, antialias: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(COLORS.bg);

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(COLORS.bg, 18, 30);
  clock = new THREE.Clock();

  setupCamera();
  window.addEventListener('resize', () => {
    renderer.setSize(innerWidth, innerHeight);
    setupCamera();
  });

  scene.add(new THREE.AmbientLight(0x999999, 0.85));
  const dl = new THREE.DirectionalLight(0xbbbbbb, 0.6);
  dl.position.set(-2, 10, 4);
  scene.add(dl);

  arena = buildArena();
  player = makeChar(COLORS.player, COLORS.playerAcc, true);
  enemy = makeChar(COLORS.enemy, COLORS.enemyAcc, false);
  ai = new AI(enemy);
  input = new Input();
  ui = new UI();

  tick();
}

function setupCamera() {
  const aspect = innerWidth / innerHeight;
  const vSize = 18;
  camera = new THREE.OrthographicCamera(
    -vSize * aspect / 2, vSize * aspect / 2,
    vSize / 2, -vSize / 2, 0.1, 100
  );
  camera.position.set(0, 20, 7);
  camera.lookAt(0, 0, 0);
}

// ============================================================
// ARENA
// ============================================================
function buildArena() {
  const a = { walls: [] };
  const floor = box(ARENA_W, 0.1, ARENA_H, COLORS.floor);
  floor.position.y = -0.05;
  scene.add(floor);

  const hw = ARENA_W / 2, hh = ARENA_H / 2;
  const wallDefs = [
    { x: 0, z: -hh - WALL_T/2, w: ARENA_W + WALL_T*2, d: WALL_T },
    { x: 0, z: hh + WALL_T/2, w: ARENA_W + WALL_T*2, d: WALL_T },
    { x: -hw - WALL_T/2, z: 0, w: WALL_T, d: ARENA_H + WALL_T*2 },
    { x: hw + WALL_T/2, z: 0, w: WALL_T, d: ARENA_H + WALL_T*2 },
  ];
  wallDefs.forEach(wd => {
    const w = box(wd.w, WALL_H, wd.d, COLORS.wall);
    w.position.set(wd.x, WALL_H / 2, wd.z);
    scene.add(w);
    const wt = box(wd.w, 0.1, wd.d, COLORS.wallTop);
    wt.position.set(wd.x, WALL_H + 0.05, wd.z);
    scene.add(wt);
    a.walls.push({ x: wd.x, z: wd.z, hw: wd.w / 2, hd: wd.d / 2 });
  });

  // Cover blocks (start at index 4)
  const covers = [
    { x: -2.5, z: 0, w: 0.8, d: 1.6 },
    { x:  2.5, z: 0, w: 0.8, d: 1.6 },
    { x: 0, z: -3.5, w: 1.6, d: 0.8 },
    { x: 0, z:  3.5, w: 1.6, d: 0.8 },
  ];
  covers.forEach(c => {
    const b = box(c.w, 0.8, c.d, COLORS.cover);
    b.position.set(c.x, 0.4, c.z);
    scene.add(b);
    a.walls.push({ x: c.x, z: c.z, hw: c.w / 2, hd: c.d / 2 });
  });

  return a;
}

function wallCollide(pos, radius) {
  const hw = ARENA_W / 2 - radius;
  const hh = ARENA_H / 2 - radius;
  pos.x = clamp(pos.x, -hw, hw);
  pos.z = clamp(pos.z, -hh, hh);
  for (let i = 4; i < arena.walls.length; i++) {
    const w = arena.walls[i];
    const dx = pos.x - clamp(pos.x, w.x - w.hw, w.x + w.hw);
    const dz = pos.z - clamp(pos.z, w.z - w.hd, w.z + w.hd);
    const d = Math.sqrt(dx * dx + dz * dz);
    if (d < radius && d > 0.001) {
      pos.x += (dx / d) * (radius - d);
      pos.z += (dz / d) * (radius - d);
    } else if (d < 0.001) {
      const ox = (w.hw + radius) - Math.abs(pos.x - w.x);
      const oz = (w.hd + radius) - Math.abs(pos.z - w.z);
      if (ox < oz) pos.x += ox * Math.sign(pos.x - w.x);
      else pos.z += oz * Math.sign(pos.z - w.z);
    }
  }
}

// ============================================================
// CHARACTER
// ============================================================
function makeChar(color, accent, isPlayer) {
  const g = new THREE.Group();
  const s = 0.45;
  const body = box(0.5*s, 0.55*s, 0.35*s, color); body.position.y = 0.55*s; g.add(body);
  const head = box(0.4*s, 0.4*s, 0.35*s, color); head.position.y = 1.0*s; g.add(head);
  const eyeM = new THREE.MeshBasicMaterial({ color: accent });
  const el = new THREE.Mesh(new THREE.BoxGeometry(0.08*s,0.05*s,0.03*s), eyeM);
  el.position.set(-0.08*s, 1.02*s, 0.17*s); g.add(el);
  const er = el.clone(); er.position.x = 0.08*s; g.add(er);
  const hat = box(0.44*s, 0.1*s, 0.38*s, accent); hat.position.y = 1.22*s; g.add(hat);
  const ll = box(0.14*s, 0.3*s, 0.14*s, 0x141416); ll.position.set(-0.1*s, 0.15*s, 0); g.add(ll);
  const rl = box(0.14*s, 0.3*s, 0.14*s, 0x141416); rl.position.set(0.1*s, 0.15*s, 0); g.add(rl);
  scene.add(g);

  return {
    g, body, head, ll, rl,
    x: 0, z: 0, angle: 0, hp: 100, maxHp: 100,
    energy: 100, maxEnergy: 100,
    atkTimer: 0, alive: true,
    dashTimer: 0, dashCooldown: 0, dashDirX: 0, dashDirZ: 0,
    isDashing: false, dashHit: false,
    invuln: 0, hitFlash: 0, bobPhase: Math.random() * 6.28,
    isPlayer,
  };
}

function charUpdate(c, dt) {
  if (!c.alive) return;
  if (c.atkTimer > 0) c.atkTimer -= dt;
  if (c.invuln > 0) c.invuln -= dt;
  if (c.hitFlash > 0) c.hitFlash -= dt;
  if (c.dashCooldown > 0) c.dashCooldown -= dt;
  if (c.dashTimer > 0) {
    c.dashTimer -= dt;
    if (c.dashTimer <= 0) c.isDashing = false;
  }

  c.bobPhase += dt * (c.isDashing ? 14 : 3);
  const bob = Math.sin(c.bobPhase) * 0.015;
  c.body.position.y = 0.55 * 0.45 + bob;
  c.head.position.y = 1.0 * 0.45 + bob;

  if (c.isDashing) {
    const sw = Math.sin(c.bobPhase) * 0.4;
    c.ll.rotation.x = sw; c.rl.rotation.x = -sw;
  } else {
    c.ll.rotation.x *= 0.8; c.rl.rotation.x *= 0.8;
  }

  const emH = c.hitFlash > 0 && Math.sin(c.hitFlash * 30) > 0 ? 0xff2222 : 0x000000;
  c.body.material.emissive.setHex(emH);
  c.head.material.emissive.setHex(emH);
  if (c.isDashing) c.body.material.emissive.setHex(c.isPlayer ? 0x2266cc : 0xcc2222);

  c.g.position.set(c.x, 0, c.z);
  c.g.rotation.y = c.angle;
}

function charDamage(c, dmg) {
  if (c.invuln > 0 || !c.alive) return false;
  c.hp = Math.max(0, c.hp - dmg);
  c.hitFlash = 0.25;
  c.invuln = 0.1;
  if (c.hp <= 0) charDie(c);
  return true;
}

function charDie(c) {
  c.alive = false;
  let t = 0;
  const fall = () => {
    t += 0.03;
    c.g.rotation.z = Math.min(t * 4, Math.PI / 2);
    c.g.position.y = -t * 0.5;
    if (t < 0.5) requestAnimationFrame(fall);
  };
  fall();
}

function charRespawn(c, x, z) {
  c.hp = c.maxHp; c.energy = c.maxEnergy; c.alive = true;
  c.x = x; c.z = z; c.angle = 0; c.isDashing = false;
  c.dashTimer = 0; c.dashCooldown = 0; c.atkTimer = 0;
  c.invuln = 1.2; c.hitFlash = 0;
  c.g.rotation.z = 0; c.g.position.y = 0;
}

function charDash(c, dx, dz) {
  if (c.dashCooldown > 0 || c.energy < 25 || !c.alive) return false;
  c.energy -= 25;
  c.dashCooldown = 1.2;
  c.dashTimer = 0.18;
  c.isDashing = true;
  c.dashHit = false;
  const len = Math.sqrt(dx * dx + dz * dz) || 1;
  c.dashDirX = dx / len;
  c.dashDirZ = dz / len;
  return true;
}

// ============================================================
// PROJECTILES (with ricochet, max 2 bounces)
// ============================================================
function spawnBullet(owner, angle) {
  if (projectiles.length >= MAX_PROJ) { scene.remove(projectiles[0].m); projectiles.shift(); }
  const a = angle + (Math.random() - 0.5) * WEAPON.spread * 2;
  const m = box(WEAPON.sz, WEAPON.sz, WEAPON.sz * 1.8, owner.isPlayer ? COLORS.pBullet : COLORS.eBullet);
  m.position.set(owner.x, 0.5, owner.z);
  m.rotation.y = a;
  scene.add(m);
  projectiles.push({
    m, x: owner.x, z: owner.z,
    vx: Math.sin(a) * WEAPON.spd, vz: Math.cos(a) * WEAPON.spd,
    dmg: WEAPON.dmg, owner, life: 2.5, sz: WEAPON.sz,
    bounces: MAX_BOUNCES,
  });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    p.x += p.vx * dt;
    p.z += p.vz * dt;

    let died = p.life <= 0;

    // Hit characters first (so bullet doesn't phase through)
    if (!died) {
      const targets = [player, enemy];
      for (const t of targets) {
        if (!t.alive || t.invuln > 0 || t === p.owner) continue;
        if (dist2D(p.x, p.z, t.x, t.z) < 0.45) {
          charDamage(t, p.dmg);
          spawnHitParts(p.x, 0.5, p.z, 0xff5555, 4);
          died = true;
          break;
        }
      }
    }

    // Outer arena walls — ricochet
    if (!died) {
      const hw = ARENA_W / 2 - p.sz, hh = ARENA_H / 2 - p.sz;
      let bounced = false;
      if (p.x > hw)      { p.x = hw - (p.x - hw);   p.vx = -p.vx; bounced = true; }
      else if (p.x < -hw){ p.x = -hw - (p.x + hw);  p.vx = -p.vx; bounced = true; }
      if (p.z > hh)      { p.z = hh - (p.z - hh);   p.vz = -p.vz; bounced = true; }
      else if (p.z < -hh){ p.z = -hh - (p.z + hh);  p.vz = -p.vz; bounced = true; }
      if (bounced) {
        if (p.bounces > 0) { p.bounces--; spawnHitParts(p.x, 0.5, p.z, COLORS.spark, 2); }
        else died = true;
      }
    }

    // Cover blocks — ricochet (AABB)
    if (!died) {
      for (let j = 4; j < arena.walls.length; j++) {
        const w = arena.walls[j];
        const cx = clamp(p.x, w.x - w.hw, w.x + w.hw);
        const cz = clamp(p.z, w.z - w.hd, w.z + w.hd);
        const dx = p.x - cx, dz = p.z - cz;
        if (dx*dx + dz*dz < p.sz * p.sz) {
          if (p.bounces > 0) {
            const overlapX = (w.hw + p.sz) - Math.abs(p.x - w.x);
            const overlapZ = (w.hd + p.sz) - Math.abs(p.z - w.z);
            if (overlapX < overlapZ) {
              p.x += overlapX * Math.sign(p.x - w.x);
              p.vx = -p.vx;
            } else {
              p.z += overlapZ * Math.sign(p.z - w.z);
              p.vz = -p.vz;
            }
            p.bounces--;
            spawnHitParts(p.x, 0.5, p.z, COLORS.spark, 2);
          } else {
            died = true;
          }
          break;
        }
      }
    }

    if (died) {
      spawnHitParts(p.x, 0.5, p.z, COLORS.spark, 2);
      scene.remove(p.m); projectiles.splice(i, 1);
    } else {
      p.m.position.set(p.x, 0.5, p.z);
      p.m.rotation.y = Math.atan2(p.vx, p.vz);
    }
  }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnHitParts(x, y, z, color, count) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTS) { scene.remove(particles[0].m); particles.shift(); }
    const s = 0.03 + Math.random() * 0.05;
    const m = box(s, s, s, color);
    m.material.transparent = true;
    m.position.set(x, y, z);
    scene.add(m);
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    particles.push({ m, vx: Math.cos(a)*sp, vy: 1+Math.random()*2, vz: Math.sin(a)*sp, life: 0.3+Math.random()*0.2 });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.m.position.x += p.vx * dt;
    p.m.position.y += p.vy * dt;
    p.m.position.z += p.vz * dt;
    p.vy -= 8 * dt;
    p.m.material.opacity = Math.max(0, p.life * 3);
    if (p.life <= 0) { scene.remove(p.m); particles.splice(i, 1); }
  }
}

// ============================================================
// AI
// ============================================================
class AI {
  constructor(c) { this.c = c; this.state = 'idle'; this.t = 0; this.strafeD = 1; }

  update(dt) {
    const c = this.c;
    if (!c.alive || !player.alive) return;
    this.t -= dt;

    const d = dist2D(c.x, c.z, player.x, player.z);
    const ang = Math.atan2(player.x - c.x, player.z - c.z);
    c.angle = ang;

    c.energy = Math.min(c.maxEnergy, c.energy + 12 * dt);

    if (this.t <= 0) {
      if (d > 5) this.setState('chase');
      else if (d < 2.2) this.setState('retreat');
      else this.setState(Math.random() < 0.5 ? 'attack' : 'strafe');
    }

    const spd = 3.2 * dt;
    switch(this.state) {
      case 'chase':
        c.x += Math.sin(ang) * spd; c.z += Math.cos(ang) * spd;
        break;
      case 'retreat':
        c.x -= Math.sin(ang) * spd; c.z -= Math.cos(ang) * spd;
        break;
      case 'strafe': {
        const sa = ang + (Math.PI/2) * this.strafeD;
        c.x += Math.sin(sa) * spd * 0.7;
        c.z += Math.cos(sa) * spd * 0.7;
        if (c.atkTimer <= 0 && Math.random() < 0.35) {
          c.atkTimer = WEAPON.rate;
          spawnBullet(c, ang + (Math.random()-0.5)*0.18);
        }
        break;
      }
      case 'attack':
        if (c.atkTimer <= 0) {
          c.atkTimer = WEAPON.rate;
          spawnBullet(c, ang + (Math.random()-0.5)*0.12);
        }
        if (d < 3.5 && c.energy >= 25 && Math.random() < 0.012) {
          charDash(c, Math.sin(ang), Math.cos(ang));
        }
        break;
    }
    wallCollide(c, 0.3);
  }

  setState(s) {
    this.state = s;
    this.t = 0.7 + Math.random() * 1.2;
    if (s === 'strafe') this.strafeD *= -1;
  }
}

// ============================================================
// INPUT
// ============================================================
class Input {
  constructor() {
    this.mx = 0; this.mz = 0; this.firing = false;
    this.keys = {}; this._msx = 0; this._msy = 0; this.mouseAim = false;
    if (IS_MOBILE) this.initMobile(); else this.initDesktop();
  }

  initMobile() {
    document.body.style.cursor = 'none';
    this.createMobileUI();
  }

  createMobileUI() {
    const jz = document.createElement('div');
    Object.assign(jz.style, {
      position:'fixed', bottom:'40px', left:'0', width:'45%', height:'45%', zIndex:'40'
    });
    document.body.appendChild(jz);
    this.jzEl = jz;
    this.jBase = null; this.jKnob = null; this.jTouchId = null;

    jz.addEventListener('touchstart', e => {
      e.preventDefault();
      if (this.jTouchId !== null) return;
      const t = e.changedTouches[0];
      this.jTouchId = t.identifier;
      this.jOx = t.clientX; this.jOy = t.clientY;
      this.jBase = mkDiv('joystick-base', t.clientX, t.clientY, 100);
      this.jKnob = mkDiv('joystick-knob', t.clientX, t.clientY, 44);
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === this.jTouchId) {
          const dx = t.clientX - this.jOx, dy = t.clientY - this.jOy;
          const d = Math.sqrt(dx*dx+dy*dy), max = 50;
          const cd = Math.min(d, max), a = Math.atan2(dy, dx);
          const nx = Math.cos(a)*cd, ny = Math.sin(a)*cd;
          this.mx = nx/max; this.mz = ny/max;
          if (this.jKnob) { this.jKnob.style.left=(this.jOx+nx)+'px'; this.jKnob.style.top=(this.jOy+ny)+'px'; }
        }
      }
    }, { passive: false });

    const endTouch = e => {
      for (const t of e.changedTouches) {
        if (t.identifier === this.jTouchId) {
          this.jTouchId = null; this.mx = 0; this.mz = 0;
          if (this.jBase) { this.jBase.remove(); this.jBase = null; }
          if (this.jKnob) { this.jKnob.remove(); this.jKnob = null; }
        }
      }
    };
    document.addEventListener('touchend', endTouch);
    document.addEventListener('touchcancel', endTouch);

    const btnWrap = document.createElement('div');
    Object.assign(btnWrap.style, {
      position:'fixed', bottom:'90px', right:'14px', zIndex:'45',
      display:'flex', flexDirection:'column', gap:'12px', alignItems:'center',
    });
    document.body.appendChild(btnWrap);
    this.btnWrap = btnWrap;

    this.fireBtn = mkBtn(btnWrap, 'FIRE', '#4499ff', '#001a33', e => { e.preventDefault(); e.stopPropagation(); this.firing = true; });
    this.fireBtn.addEventListener('touchend', () => { this.firing = false; });
    this.fireBtn.addEventListener('touchcancel', () => { this.firing = false; });

    this.dashBtn = mkBtn(btnWrap, 'DASH', '#cccccc', '#202024', e => {
      e.preventDefault(); e.stopPropagation();
      const dx = this.moving ? this.mx : Math.sin(player.angle);
      const dz = this.moving ? this.mz : Math.cos(player.angle);
      charDash(player, dx, dz);
    });
  }

  initDesktop() {
    document.body.style.cursor = 'crosshair';

    document.addEventListener('keydown', e => {
      this.keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') {
        e.preventDefault();
        const dx = this.moving ? this.mx : Math.sin(player.angle);
        const dz = this.moving ? this.mz : Math.cos(player.angle);
        charDash(player, dx, dz);
      }
    });
    document.addEventListener('keyup', e => { this.keys[e.key.toLowerCase()] = false; });

    document.addEventListener('mousemove', e => { this._msx = e.clientX; this._msy = e.clientY; this.mouseAim = true; });
    document.addEventListener('pointerdown', e => {
      if (e.target.tagName === 'BUTTON') return;
      if (e.button === 0) this.firing = true;
      if (e.button === 2) {
        e.preventDefault();
        const dx = this.moving ? this.mx : Math.sin(player.angle);
        const dz = this.moving ? this.mz : Math.cos(player.angle);
        charDash(player, dx, dz);
      }
    });
    document.addEventListener('pointerup', e => { if (e.button === 0) this.firing = false; });
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('blur', () => { this.firing = false; this.keys = {}; });

    const hint = document.createElement('div');
    hint.textContent = 'WASD move · Mouse aim · Click shoot · Space/Right-click dash';
    Object.assign(hint.style, {
      position:'fixed', bottom:'14px', left:'50%', transform:'translateX(-50%)',
      fontSize:'10px', color:'#3a3a4a', letterSpacing:'1px', zIndex:'44', pointerEvents:'none',
    });
    document.body.appendChild(hint);
    this.hint = hint;
  }

  updateDesktopMove() {
    if (IS_MOBILE) return;
    let kx = 0, kz = 0;
    if (this.keys['w'] || this.keys['arrowup']) kz = -1;
    if (this.keys['s'] || this.keys['arrowdown']) kz = 1;
    if (this.keys['a'] || this.keys['arrowleft']) kx = -1;
    if (this.keys['d'] || this.keys['arrowright']) kx = 1;
    if (kx || kz) { const l = Math.sqrt(kx*kx+kz*kz); this.mx = kx/l; this.mz = kz/l; }
    else { this.mx = 0; this.mz = 0; }
  }

  updateMouseWorld() {
    if (!this.mouseAim || IS_MOBILE) return;
    const c = document.getElementById('c');
    const ndcX = (this._msx / c.clientWidth) * 2 - 1;
    const ndcY = -(this._msy / c.clientHeight) * 2 + 1;
    const v = new THREE.Vector3(ndcX, ndcY, 0);
    v.unproject(camera);
    const dir = new THREE.Vector3(0, 0, -1).transformDirection(camera.matrixWorld);
    if (Math.abs(dir.y) > 0.001) {
      const t = -v.y / dir.y;
      this._worldX = v.x + dir.x * t;
      this._worldZ = v.z + dir.z * t;
    }
  }

  get moving() { return Math.abs(this.mx) > 0.1 || Math.abs(this.mz) > 0.1; }
  get aimX() { return this._worldX || 0; }
  get aimZ() { return this._worldZ || 0; }

  showGame() {
    if (this.btnWrap) this.btnWrap.style.display = 'flex';
    if (this.hint) this.hint.style.display = '';
  }
  hideGame() {
    if (this.btnWrap) this.btnWrap.style.display = 'none';
    if (this.hint) this.hint.style.display = 'none';
  }
}

// ============================================================
// UI
// ============================================================

            <div id="hp-p-fill" style="height:100%;width:100%;background:linear-gradient(90deg,#1a55bb,#3399ff);transition:width .15s"></div>
          </div>
          <div style="font-size:7px;color:#5a6a8a;text-align:left;margin-top:2px;letter-spacing:2px">YOU</div>
        </div>
        <div style="text-align:center;min-width:24px">
          <div style="font-size:9px;color:#444;letter-spacing:3px">VS</div>
        </div>
        <div style="flex:1;max-width:130px">

            <div id="hp-e-fill" style="height:100%;width:100%;background:linear-gradient(270deg,#bb1a1a,#ff3333);transition:width .15s"></div>
          </div>
          <div style="font-size:7px;color:#8a5a5a;text-align:right;margin-top:2px;letter-spacing:2px">ENEMY</div>

    });
    this.menu.innerHTML = `
      <div style="font-size:30px;font-weight:bold;color:#cccccc;letter-spacing:6px">ARCHERO PVP</div>

      <button id="btn-fight" style="width:180px;padding:13px;font-family:Courier New;font-size:14px;font-weight:bold;letter-spacing:4px;border:2px solid #4499ff;background:rgba(68,153,255,0.10);color:#4499ff;cursor:pointer">FIGHT</button>

    document.getElementById('hp-p-fill').style.width = (player.hp/player.maxHp*100)+'%';
    document.getElementById('hp-e-fill').style.width = (enemy.hp/enemy.maxHp*100)+'%';

// ============================================================
// GAME FLOW
// ============================================================
function showMenu() {
  state = 'menu';
  ui.menu.style.display = 'flex';
  ui.result.style.display = 'none';
  ui.el.style.display = 'none';
  input.hideGame();
}

function startRound() {
  state = 'play';
  ui.menu.style.display = 'none';
  ui.result.style.display = 'none';
  ui.el.style.display = '';
  input.showGame();

  charRespawn(player, SPAWN_P.x, SPAWN_P.z);
  charRespawn(enemy, SPAWN_E.x, SPAWN_E.z);
  ai.setState('idle');

  projectiles.forEach(p => scene.remove(p.m)); projectiles = [];
  particles.forEach(p => scene.remove(p.m)); particles = [];
}

function endRound(playerWon) {
  state = 'result';
  ui.result.style.display = 'flex';
  const txt = document.getElementById('result-txt');
  txt.textContent = playerWon ? 'VICTORY' : 'DEFEAT';
  txt.style.color = playerWon ? '#4499ff' : '#ff4444';
  txt.style.textShadow = '0 0 20px currentColor';
  input.hideGame();
}

// ============================================================
// MAIN LOOP
// ============================================================
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state !== 'play') { renderer.render(scene, camera); return; }

  input.updateDesktopMove();
  input.updateMouseWorld();

  if (player.alive) {
    if (player.isDashing) {
      player.x += player.dashDirX * 13 * dt;
      player.z += player.dashDirZ * 13 * dt;
      wallCollide(player, 0.3);
      if (!player.dashHit && dist2D(player.x, player.z, enemy.x, enemy.z) < 0.65) {
        player.dashHit = true;
        charDamage(enemy, 22);
        spawnHitParts(enemy.x, 0.5, enemy.z, 0x4499ff, 5);
        const a = Math.atan2(enemy.x-player.x, enemy.z-player.z);
        enemy.x += Math.sin(a)*1.2; enemy.z += Math.cos(a)*1.2;
        wallCollide(enemy, 0.3);
      }
    } else if (input.moving) {
      player.x += input.mx * 3.8 * dt;
      player.z += input.mz * 3.8 * dt;
      wallCollide(player, 0.3);

      if (!IS_MOBILE && input.mouseAim) {
        player.angle = Math.atan2(input.aimX - player.x, input.aimZ - player.z);
      } else {
        player.angle = Math.atan2(input.mx, input.mz);
      }
      if (input.firing) shootPlayer();
    } else {
      player.energy = Math.min(player.maxEnergy, player.energy + 15 * dt);
      if (!IS_MOBILE && input.mouseAim) {
        player.angle = Math.atan2(input.aimX - player.x, input.aimZ - player.z);
      } else if (enemy.alive) {
        player.angle = Math.atan2(enemy.x - player.x, enemy.z - player.z);
      }
      if (input.firing) shootPlayer();
    }
  }

  ai.update(dt);
  if (enemy.isDashing && !enemy.dashHit && dist2D(enemy.x, enemy.z, player.x, player.z) < 0.65) {
    enemy.dashHit = true;
    charDamage(player, 22);
    spawnHitParts(player.x, 0.5, player.z, 0xff4444, 5);
  }

  charUpdate(player, dt);
  charUpdate(enemy, dt);
  updateProjectiles(dt);
  updateParticles(dt);
  ui.update();

  // First blood
  if (!enemy.alive) endRound(true);
  else if (!player.alive) endRound(false);

  renderer.render(scene, camera);
}

function shootPlayer() {
  if (player.atkTimer > 0 || !player.alive || !enemy.alive) return;
  player.atkTimer = WEAPON.rate;

  let aimAngle = player.angle;
  if (IS_MOBILE && !input.moving) {
    aimAngle = Math.atan2(enemy.x - player.x, enemy.z - player.z);
    player.angle = aimAngle;
  }
  spawnBullet(player, aimAngle);
}

// ============================================================
// HELPERS
// ============================================================
function box(w, h, d, color) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ color }));
}
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function dist2D(x1, z1, x2, z2) { const dx=x1-x2, dz=z1-z2; return Math.sqrt(dx*dx+dz*dz); }

function mkDiv(cls, x, y, size) {
  const d = document.createElement('div');
  Object.assign(d.style, {
    position:'absolute', width:size+'px', height:size+'px', borderRadius:'50%',
    left:x+'px', top:y+'px', transform:'translate(-50%,-50%)', pointerEvents:'none',
    border: cls.includes('base') ? '2px solid rgba(255,255,255,0.10)' : '2px solid rgba(68,153,255,0.6)',
    background: cls.includes('base') ? 'rgba(255,255,255,0.04)' : 'rgba(68,153,255,0.25)',
  });
  document.body.appendChild(d);
  return d;
}

function mkBtn(parent, text, color, bg, onTouch) {
  const b = document.createElement('button');
  b.textContent = text;
  Object.assign(b.style, {
    width:'64px', height:'64px', borderRadius:'50%',
    border:'3px solid ' + color + '99', background: bg + 'cc',
    color, fontFamily:'Courier New', fontSize:'11px', fontWeight:'bold',
    display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
  });
  b.addEventListener('touchstart', onTouch, { passive: false });
  parent.appendChild(b);
  return b;
}

// ============================================================
// BOOT
// ============================================================
init();
showMenu();

</script>
