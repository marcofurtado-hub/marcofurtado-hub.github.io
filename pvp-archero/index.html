ent(circle,#ffeb70 0,#ffb024 100%);border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(255,200,80,.7);transition:left .2s ease;z-index:5}#wave-count{position:absolute;top:54px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:3px;color:#ffefd9;text-shadow:0 2px 0 #000;background:rgba(0,0,0,.45);padding:5px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12)}#weapon-chip{position:absolute;top:54px;left:16px;font-size:10px;letter-spacing:1.5px;font-weight:900;color:#5aa8ff;background:rgba(0,0,0,.55);padding:4px 10px;border-radius:10px;border:1px solid rgba(90,168,255,.5);text-shadow:0 1px 0 #000}#banner{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:46px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 4px 0 #000,0 0 14px rgba(255,255,255,.4);opacity:0;pointer-events:none}#banner.show{animation:bannerIn 1.4s ease-out forwards}#banner.danger{color:#ff3aaa;text-shadow:0 4px 0 #4a0033,0 0 22px rgba(255,58,170,.7)}#banner.success{color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 22px rgba(123,224,216,.8)}@keyframes bannerIn{0%{opacity:0;transform:translateY(-30px) scale(.7)}20%{opacity:1;transform:translateY(0) scale(1.15)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(.95)}}#touch-ring{position:absolute;width:130px;height:130px;border:2px solid rgba(123,224,216,.55);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%) scale(.6);opacity:0;transition:opacity .14s,transform .14s;background:radial-gradient(circle,rgba(123,224,216,.12) 0,rgba(123,224,216,0) 70%);box-shadow:0 0 14px rgba(123,224,216,.35);z-index:40}#touch-ring.active{opacity:1;transform:translate(-50%,-50%) scale(1)}#touch-ring .dot{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,rgba(123,224,216,.85) 0,rgba(123,224,216,.5) 100%);border:2px solid rgba(255,255,255,.4);transform:translate(-50%,-50%);transition:transform 40ms linear;box-shadow:0 4px 10px rgba(0,0,0,.35)}#joy-hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55);pointer-events:none;text-align:center;background:rgba(0,0,0,.35);padding:10px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.12);white-space:nowrap}#joy-hint .touch-hint{display:none}#joy-hint .kbm-hint{display:inline}@media (hover:none){#joy-hint .touch-hint{display:inline}#joy-hint .kbm-hint{display:none}}#joy-hint.hidden{opacity:0;transition:opacity .4s}#endcard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse at center,rgba(0,0,0,.7) 0,rgba(20,20,20,.95) 100%);padding:24px;z-index:60}#endcard.show{display:flex}#endcard .hd{font-size:52px;letter-spacing:4px;color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 28px rgba(123,224,216,.7);margin-bottom:14px}#endcard.loss .hd{color:#ff3030;text-shadow:0 4px 0 #4a0000,0 0 28px rgba(255,48,48,.7)}#endcard.loss .cta{background:linear-gradient(135deg,#ff3030 0,#a01010 100%);color:#fff;box-shadow:0 0 32px rgba(255,48,48,.6),0 6px 0 #4a0000}#endcard .sub{font-size:18px;color:#ffefd9;margin-bottom:36px;letter-spacing:1px}#endcard .cta{padding:20px 44px;background:linear-gradient(135deg,#7be0d8 0,#3aa8a0 100%);color:#001a18;border:none;font-family:Impact,'Arial Black',sans-serif;font-size:24px;letter-spacing:2px;cursor:pointer;border-radius:14px;box-shadow:0 0 32px rgba(123,224,216,.6),0 6px 0 #003a36;animation:ctapulse 1.2s ease-in-out infinite}@keyframes ctapulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}#endcard .cta-sub{font-size:13px;color:#ffefd9;margin-top:14px;letter-spacing:1px}</style><script>window.__ASSETS__={"bgm_battle.mp3":"data:audio/mpeg;base64,SUQzBAAAAAABBlRYWFgAAAASAAADbWFqb3JfYnJhbmQATTRBIABUWFhYAAAAEwAAA21pbm9yX3ZlcnNpb24ANTEyAFRYWFgAAAAgAAADY29tcGF0aWJsZV9icmFuZHMATTRBIGlzb21pc28yAFRTU0UAAAAPAAADTGF2ZjYyLjEyLjEwMAAAAAAAAAAA
