<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="ad.size" content="width=320,height=480"><title>PvP Archero</title><script src="mraid.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;overflow:hidden;background:#3a3a3a;font-family:'Arial Black',Impact,sans-serif;color:#fff;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;touch-action:none}#hud{position:absolute;inset:0;pointer-events:none;z-index:10}#hud .pe{pointer-events:auto}#status-bar{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:2px;font-weight:900;text-shadow:0 2px 0 rgba(0,0,0,.6)}.team-label{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);padding:6px 12px;border-radius:14px}.team-label .dot{width:10px;height:10px;border-radius:50%;display:inline-block}.team-label.you{color:#7be0d8}.team-label.you .dot{background:#7be0d8;box-shadow:0 0 8px #7be0d8}.team-label.rival{color:#d8c840}.team-label.rival .dot{background:#d8c840;box-shadow:0 0 8px #d8c840}#wave-count{position:absolute;top:54px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:3px;color:#ffefd9;text-shadow:0 2px 0 #000;background:rgba(0,0,0,.45);padding:5px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12)}#banner{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:46px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 4px 0 #000,0 0 14px rgba(255,255,255,.4);opacity:0;pointer-events:none}#banner.show{animation:bannerIn 1.4s ease-out forwards}#banner.danger{color:#ff3aaa;text-shadow:0 4px 0 #4a0033,0 0 22px rgba(255,58,170,.7)}#banner.success{color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 22px rgba(123,224,216,.8)}@keyframes bannerIn{0%{opacity:0;transform:translateY(-30px) scale(.7)}20%{opacity:1;transform:translateY(0) scale(1.15)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(.95)}}#joystick{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:108px;height:108px;background:radial-gradient(circle,rgba(255,255,255,.08) 0,rgba(255,255,255,.03) 70%);border:2px solid rgba(255,255,255,.25);border-radius:50%;pointer-events:auto;display:flex;align-items:center;justify-content:center;z-index:50;transition:border-color .15s,background .15s}#joystick.active{border-color:rgba(123,224,216,.7);background:radial-gradient(circle,rgba(123,224,216,.15) 0,rgba(123,224,216,.05) 70%)}#joy-knob{width:50px;height:50px;background:radial-gradient(circle,rgba(255,255,255,.35) 0,rgba(255,255,255,.18) 100%);border:2px solid rgba(255,255,255,.4);border-radius:50%;pointer-events:none;transition:background .15s;box-shadow:0 4px 12px rgba(0,0,0,.3)}#joystick.active #joy-knob{background:radial-gradient(circle,rgba(123,224,216,.7) 0,rgba(123,224,216,.4) 100%)}#joy-hint{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.55);pointer-events:none}#joy-hint.hidden{display:none}#endcard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse at center,rgba(0,0,0,.7) 0,rgba(20,20,20,.95) 100%);padding:24px;z-index:60}#endcard.show{display:flex}#endcard .hd{font-size:52px;letter-spacing:4px;color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 28px rgba(123,224,216,.7);margin-bottom:14px}#endcard.loss .hd{color:#ff3030;text-shadow:0 4px 0 #4a0000,0 0 28px rgba(255,48,48,.7)}#endcard.loss .cta{background:linear-gradient(135deg,#ff3030 0,#a01010 100%);color:#fff;box-shadow:0 0 32px rgba(255,48,48,.6),0 6px 0 #4a0000}#endcard .sub{font-size:18px;color:#ffefd9;margin-bottom:36px;letter-spacing:1px}#endcard .cta{paddi
