<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="ad.size" content="width=320,height=480"><title>Estilingue Wars</title><script src="mraid.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Arial Black',Impact,sans-serif;color:#fff;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}#hud,canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(100vw,calc(100vh * 9 / 16));height:min(100vh,calc(100vw * 16 / 9))}canvas{display:block;touch-action:none;cursor:crosshair;background:#3a4a2a}@media (hover:none){canvas{cursor:default}}#hud{pointer-events:none;z-index:10}#battle-bar{position:absolute;top:14px;left:14px;right:14px;height:28px;background:#0c0c0c;border-radius:14px;border:2px solid rgba(255,255,255,.18);overflow:visible;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.5)}#battle-bar .bb-track{position:absolute;inset:2px;border-radius:11px;background:#000;overflow:hidden}#battle-bar .bb-fill{position:absolute;top:0;bottom:0;transition:width .15s ease}#battle-bar .bb-fill.left{left:0;background:linear-gradient(90deg,#1a5acc 0,#5aa8ff 100%)}#battle-bar .bb-fill.right{right:0;background:linear-gradient(270deg,#cc1a1a 0,#ff5a5a 100%)}#battle-bar .bb-num{position:absolute;top:50%;transform:translateY(-50%);font-size:11px;letter-spacing:1px;font-weight:900;color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.7)}#battle-bar .bb-num.left-num{left:10px}#battle-bar .bb-num.right-num{right:10px}#battle-bar .bb-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;background:radial-gradient(circle,#ffeb70 0,#ffb024 100%);border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(255,200,80,.7);z-index:5}#title{position:absolute;top:54px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:3px;color:#ffefd9;text-shadow:0 2px 0 #000;background:rgba(0,0,0,.45);padding:5px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12)}#banner{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:46px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 4px 0 #000,0 0 14px rgba(255,255,255,.4);opacity:0;pointer-events:none}#banner.show{animation:bannerIn 1.4s ease-out forwards}#banner.danger{color:#ff3a2c;text-shadow:0 4px 0 #4a0000,0 0 18px rgba(255,58,44,.6)}#banner.success{color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 18px rgba(123,224,216,.7)}@keyframes bannerIn{0%{opacity:0;transform:translateY(-30px) scale(.7)}20%{opacity:1;transform:translateY(0) scale(1.15)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(.95)}}#hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55);pointer-events:none;text-align:center;background:rgba(0,0,0,.35);padding:10px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.12);white-space:nowrap}#hint.hidden{opacity:0;transition:opacity .4s}#sling{position:absolute;inset:0;pointer-events:none}#sling-line{position:absolute;height:4px;background:linear-gradient(90deg,rgba(255,255,255,.2),rgba(123,224,216,.95));border-radius:2px;transform-origin:0 50%;opacity:0;transition:opacity .1s;box-shadow:0 0 8px rgba(123,224,216,.5)}#sling-line.active{opacity:1}#sling-dot{position:absolute;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle,#ffeb70 0,#ffb024 100%);border:2px solid #fff;transform:translate(-50%,-50%) scale(.6);opacity:0;transition:opacity .12s,transform .12s;box-shadow:0 0 16px rgba(255,200,80,.7)}#sling-dot.active{opacity:1;transform:translate(-50%,-50%) scale(1)}#endcard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse at center,rgba(0,0,0,.7) 0,rgba(20,20,20,.95) 100%);padding:24px;z-index:60}#endcard.show{display:flex}#endcard .hd{font-size:52px;letter-spacing:4px;color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 28px rgba(123,224,216,.7);margin-bottom:14px}#endcard.loss .hd{color:#ff3030;text-shadow:0 4px 0 #4a0000,0 0 28px rgba(255,48,48,.7)}#endcard .sub{font-size:18px;color:#ffefd9;margin-bottom:36px;letter-spacing:1px}#endcard .cta{padding:20px 44px;background:linear-gradient(135deg,#7be0d8 0,#3aa8a0 100%);color:#001a18;border:none;font-family:Impact,'Arial Black',sans-serif;font-size:24px;letter-spacing:2px;cursor:pointer;border-radius:14px;box-shadow:0 0 32px rgba(123,224,216,.6),0 6px 0 #003a36;animation:ctapulse 1.2s ease-in-out infinite}#endcard.loss .cta{background:linear-gradient(135deg,#ff3030 0,#a01010 100%);color:#fff;box-shadow:0 0 32px rgba(255,48,48,.6),0 6px 0 #4a0000}@keyframes ctapulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}#endcard .cta-sub{font-size:13px;color:#ffefd9;margin-top:14px;letter-spacing:1px}.pe{pointer-events:auto}</style><script>window.__ASSETS__={"sfx_hit.mp3":"data:audio/mpeg;base64,SUQzBAAAAAABBlRYWFgAAAASAAADbWFqb3JfYnJhbmQATTRBIABUWFhYAAAAEwAAA21pbm9yX3ZlcnNpb24ANTEyAFRYWFgAAAAgAAADY29tcGF0aWJsZV9icmFuZHMATTRBIGlzb21pc28yAFRTU0UAAAAPAAADTGF2ZjYyLjEyLjEwMAAAAAAAAAAAAAAA//twAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAABPAABh9QAGCQwPDxMWGRwcHyMmKSksMDM2Njk8Pz9DRklMTE9TVllZXGBjZmZpbG9vc3Z5fHx/g4aJiYyQk5aWmZyfn6Omqaysr7O2ubm8wMPGxsnMz8/T1tnc3N/j5unp7PDz9vb5/P8AAAAATGF2YzYyLjI4AAAAAAAAAAAAAAAAJAVAAAAAAAAAYfWTNsTBAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7cGQAAAJyMVMVGMAAJEAa7aAIAAr9N2QY9AAA3Ids1wxgAAABIghj3dnkyBCIIAgAQcAAAIQj3dxEftEECZMmTJk07tAgQIECCEeIj//3ERn/7Xd3//7/iIjPEECBAgQIAmD4Ph//wxyhzwfB9//Lh+EySIRJ4OacCgIIg/KRI5YP6gQBDB8H/l/BD3/WfW/
