<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fff5e0">
<title>Dentista Bobinho 🦷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#fff5e0;font-family:'Comic Sans MS','Chalkboard SE','Trebuchet MS',sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(ellipse at top,#fff5e0 0%,#ffe4d0 100%)}

/* SVG mouth — viewBox 400x600 (portrait), scales to fit viewport */
#mouth-svg{width:100%;height:100%;max-width:100vh;max-height:100vh;display:block}

/* Tooth (SVG <g> element) */
.tooth{cursor:pointer;transition:transform 0.45s cubic-bezier(0.5,1.7,0.5,1),opacity 0.4s}
.tooth.spawning{opacity:0;transform:scale(0)}
.tooth.spawned{opacity:1;transform:scale(1)}
.tooth.shake{animation:toothShake 0.13s ease-in-out infinite alternate}
@keyframes toothShake{from{transform:translate(-1.5px,0) rotate(-3deg)}to{transform:translate(1.5px,0) rotate(3deg)}}
.tooth.glow .tooth-body{filter:drop-shadow(0 0 6px rgba(255,220,80,1))}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;padding:12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.hud-pill{background:rgba(255,255,255,0.92);border:3px solid #ff8aa8;border-radius:18px;padding:6px 14px;box-shadow:0 4px 0 #ffc4d6;display:flex;align-items:center;gap:8px}
.hud-pill .icon{font-size:24px;line-height:1}
.hud-pill .text{font-size:14px;font-weight:bold;color:#c0356a;text-shadow:0 1px 0 #fff}
#progress-bar{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px}
#progress-bar .label{font-size:9px;letter-spacing:2px;color:#c0356a;font-weight:bold}
#progress-bar .bar{width:120px;height:14px;background:rgba(255,200,220,0.5);border:2px solid #ff8aa8;border-radius:8px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.1)}
#progress-bar .fill{height:100%;background:linear-gradient(90deg,#ffd47a,#ff8aa8);width:0%;transition:width 0.4s cubic-bezier(0.5,1.5,0.5,1);border-radius:6px}

/* PHASE BANNER */
#banner{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:40;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.3s,transform 0.6s cubic-bezier(0.5,1.7,0.5,1)}
#banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#banner .emoji{font-size:80px;margin-bottom:8px;filter:drop-shadow(0 4px 0 rgba(0,0,0,0.15))}
#banner .text{font-size:32px;font-weight:bold;color:#fff;text-shadow:0 3px 0 #ff8aa8,0 4px 6px rgba(0,0,0,0.2);letter-spacing:2px;line-height:1}
#banner .sub{font-size:14px;color:#fff;margin-top:6px;text-shadow:0 1px 2px rgba(0,0,0,0.3);letter-spacing:1px}

/* TOOL */
#tool{position:fixed;width:120px;height:120px;pointer-events:none;z-index:30;will-change:transform;transform:translate(-50%,-50%);transition:opacity 0.25s}
#tool img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15))}
#tool.active img{animation:wiggle 0.18s ease-in-out infinite alternate}
@keyframes wiggle{from{transform:rotate(-4deg) scale(1)}to{transform:rotate(4deg) scale(1.04)}}

/* EFFECTS LAYER */
#fx-layer{position:fixed;inset:0;pointer-events:none;z-index:25}
.particle{position:absolute;pointer-events:none;will-change:transform,opacity;font-size:24px;line-height:1}
.flash-ring{position:absolute;border-radius:50%;border:4px solid #fff;pointer-events:none;animation:ringPop 0.5s ease-out forwards}
@keyframes ringPop{0%{transform:scale(0);opacity:1}100%{transform:scale(2.4);opacity:0}}

/* INTRO */
#intro{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#ffd6e8 0%,#fff5e0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;cursor:pointer}
#intro.hide{opacity:0;pointer-events:none;transition:opacity 0.5s}
#intro h1{font-size:54px;color:#ff5a85;text-shadow:0 4px 0 #fff,0 6px 0 #ff8aa8,0 7px 12px rgba(0,0,0,0.2);margin-bottom:6px;line-height:1;letter-spacing:1px;animation:bounce 1s ease-in-out infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
#intro .sub{color:#c0356a;font-size:18px;margin-bottom:24px;font-weight:bold;letter-spacing:1px}
#intro svg{width:55%;max-width:240px;margin-bottom:24px;filter:drop-shadow(0 12px 22px rgba(0,0,0,0.18))}
#intro .tap{background:#ff5a85;color:#fff;padding:14px 36px;border-radius:32px;font-size:22px;font-weight:bold;letter-spacing:2px;box-shadow:0 6px 0 #c0356a,0 10px 20px rgba(0,0,0,0.15);animation:pulseBtn 0.8s ease-in-out infinite alternate}
@keyframes pulseBtn{from{transform:scale(1)}to{transform:scale(1.06)}}

/* END */
#end{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#ffd6e8 0%,#fff5e0 100%);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#end.show{display:flex;animation:fadeIn 0.6s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#end h2{font-size:62px;color:#ff5a85;text-shadow:0 4px 0 #fff,0 6px 0 #ff8aa8,0 7px 12px rgba(0,0,0,0.2);margin-bottom:6px;letter-spacing:1px}
#end .stars{font-size:60px;margin:8px 0 14px;animation:twinkle 1s ease-in-out infinite alternate}
@keyframes twinkle{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.1) rotate(5deg)}}
#end .msg{color:#c0356a;font-size:18px;font-weight:bold;margin-bottom:24px;line-height:1.4}
#end .cta{background:linear-gradient(180deg,#7eda52,#3ba321);color:#fff;padding:18px 44px;border-radius:36px;font-size:24px;font-weight:bold;letter-spacing:2px;border:none;box-shadow:0 6px 0 #2d7a18,0 10px 20px rgba(0,0,0,0.15);cursor:pointer;animation:pulseBtn 0.8s ease-in-out infinite alternate;font-family:inherit}
#end .cta:active{transform:translateY(2px) scale(0.96);box-shadow:0 3px 0 #2d7a18}

#confetti{position:fixed;inset:0;z-index:99;pointer-events:none}
.confetti-piece{position:absolute;width:14px;height:14px;border-radius:3px;will-change:transform,opacity}
</style>
</head>
<body>

<div id="stage">
  <svg id="mouth-svg" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="faceGrad" cx="50%" cy="42%" r="65%">
        <stop offset="0%" stop-color="#fff0f5"/>
        <stop offset="60%" stop-color="#ffd6e2"/>
        <stop offset="100%" stop-color="#f5b8c8"/>
      </radialGradient>
      <radialGradient id="lipGrad" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#ffaec5"/>
        <stop offset="100%" stop-color="#ff8aa8"/>
      </radialGradient>
      <radialGradient id="darkInside" cx="50%" cy="55%" r="55%">
        <stop offset="0%" stop-color="#3a1525"/>
        <stop offset="60%" stop-color="#5a2a3a"/>
        <stop offset="100%" stop-color="#6e3548"/>
      </radialGradient>
      <linearGradient id="gumGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#ffc0d2"/>
        <stop offset="100%" stop-color="#ff95b0"/>
      </linearGradient>
      <linearGradient id="gumGradLower" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#ff95b0"/>
        <stop offset="100%" stop-color="#ffc0d2"/>
      </linearGradient>
      <linearGradient id="toothGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#ede4d0"/>
      </linearGradient>
      <linearGradient id="dirtyGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#f0d885"/>
        <stop offset="100%" stop-color="#c8a850"/>
      </linearGradient>
      <linearGradient id="rottenGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#a08068"/>
        <stop offset="100%" stop-color="#6b4a32"/>
      </linearGradient>
      <linearGradient id="tongueGrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#ff90ad"/>
        <stop offset="100%" stop-color="#e95c80"/>
      </linearGradient>
      <radialGradient id="cavityGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0a0408"/>
        <stop offset="60%" stop-color="#241016"/>
        <stop offset="100%" stop-color="#5a2a3a"/>
      </radialGradient>
      <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dx="0" dy="3"/>
        <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Egg-shaped head (matches play-doh toy aesthetic) -->
    <ellipse cx="200" cy="320" rx="170" ry="240" fill="url(#faceGrad)" stroke="#e5a8bc" stroke-width="2"/>

    <!-- Outer lip rim -->
    <ellipse cx="200" cy="305" rx="135" ry="170" fill="url(#lipGrad)"/>

    <!-- Dark mouth interior (the cave behind teeth) -->
    <ellipse cx="200" cy="300" rx="108" ry="142" fill="url(#darkInside)"/>

    <!-- Upper gum strip (inside top of dark area) -->
    <path d="M 95 245 Q 200 220 305 245 L 305 280 Q 200 252 95 280 Z" fill="url(#gumGrad)"/>
    <!-- Upper gum highlight -->
    <path d="M 110 240 Q 200 222 290 240" fill="none" stroke="#ffd6e0" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <!-- Lower gum strip (inside bottom of dark area) -->
    <path d="M 95 360 Q 200 340 305 360 L 305 395 Q 200 378 95 395 Z" fill="url(#gumGradLower)"/>
    <!-- Lower gum highlight -->
    <path d="M 110 392 Q 200 380 290 392" fill="none" stroke="#ffb8ce" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- Tongue (rounded blob between gums) -->
    <ellipse cx="200" cy="425" rx="92" ry="40" fill="url(#tongueGrad)"/>
    <!-- Tongue centerline highlight -->
    <path d="M 200 395 Q 198 420 200 455" fill="none" stroke="#ff7090" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Tooth slots layer (filled by JS) -->
    <g id="teeth-svg"></g>
  </svg>
</div>

<div id="hud">
  <div class="hud-pill" id="hud-tool">
    <span class="icon">🪥</span>
    <span class="text" id="hud-text">Escovar</span>
  </div>
  <div id="progress-bar">
    <div class="label" id="progress-label">FASE 1/4</div>
    <div class="bar"><div class="fill" id="progress-fill"></div></div>
  </div>
</div>

<div id="banner">
  <div class="emoji" id="banner-emoji">🪥</div>
  <div class="text" id="banner-text">VAMOS ESCOVAR!</div>
  <div class="sub" id="banner-sub">arrasta nos dentes amarelos</div>
</div>

<div id="tool"><img id="tool-img" alt="" /></div>
<div id="fx-layer"></div>

<div id="intro">
  <h1>DENTISTA<br>BOBINHO 🦷</h1>
  <div class="sub">limpa, drilla e arranca!</div>
  <svg viewBox="0 0 400 600" preserveAspectRatio="xMidYMid meet">
    <ellipse cx="200" cy="320" rx="170" ry="240" fill="#ffe4ec" stroke="#e5a8bc" stroke-width="2"/>
    <ellipse cx="200" cy="305" rx="135" ry="170" fill="#ff95b0"/>
    <ellipse cx="200" cy="300" rx="108" ry="142" fill="#5a2a3a"/>
    <path d="M 95 245 Q 200 220 305 245 L 305 280 Q 200 252 95 280 Z" fill="#ffaec5"/>
    <path d="M 95 360 Q 200 340 305 360 L 305 395 Q 200 378 95 395 Z" fill="#ffaec5"/>
    <ellipse cx="200" cy="425" rx="92" ry="40" fill="#ff7090"/>
    <!-- Sample teeth -->
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#fff" transform="translate(140 280)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#f0d885" transform="translate(180 270)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#fff" transform="translate(220 270)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#fff" transform="translate(260 280)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#fff" transform="translate(140 360)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#fff" transform="translate(180 365)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#a08068" transform="translate(220 365)"/></g>
    <g><rect x="-15" y="-17" width="30" height="34" rx="9" fill="#fff" transform="translate(260 360)"/></g>
  </svg>
  <div class="tap">▶ TOCAR PRA COMEÇAR</div>
</div>

<div id="end">
  <h2>BOA, DOUTOR!</h2>
  <div class="stars">⭐⭐⭐</div>
  <div class="msg">Você salvou os dentinhos!<br>Quer brincar de novo?</div>
  <button class="cta" id="cta-btn">JOGAR AGORA</button>
</div>

<div id="confetti"></div>

<script>
// ============================================================================
// CONFIG
// ============================================================================
const CTA_URL = 'https://play.google.com/store/apps/details?id=com.example.kidsdentist';

// SVG viewBox dimensions — all positions are in this coordinate space
const VBW = 400, VBH = 600;

// Tool sprites (kawaii images)
const TOOL_IMAGES = {
  brush: 'brush.webp',
  floss: 'floss.webp',
  drill: 'drill.webp',
  pliers: 'pliers.webp',
};

// ----- Tooth slots (in SVG viewBox coords 0..400 x 0..600) -----
// Upper gum is around y=260; lower gum around y=360.
// Mouth opening x range: ~110 to 290.
// Each tooth body is 30x34 rect with rx=9.
const TOOTH_SLOTS = [
  // ---- TOP arc (5 teeth hanging from upper gum) ----
  { id: 't0', x: 130, y: 282, state: 'dirty'  },
  { id: 't1', x: 170, y: 273, state: 'cavity' },
  { id: 't2', x: 200, y: 270, state: 'clean'  },
  { id: 't3', x: 230, y: 273, state: 'dirty'  },
  { id: 't4', x: 270, y: 282, state: 'rotten' },
  // ---- BOTTOM arc (5 teeth standing on lower gum) ----
  { id: 't5', x: 130, y: 360, state: 'dirty'  },
  { id: 't6', x: 170, y: 365, state: 'clean'  },
  { id: 't7', x: 200, y: 367, state: 'cavity' },
  { id: 't8', x: 230, y: 365, state: 'dirty'  },
  { id: 't9', x: 270, y: 360, state: 'clean'  },
];

// Floss gaps — between teeth on the upper arc + one on bottom
const FLOSS_GAPS = [
  { id: 'g0', x: 150, y: 277 },
  { id: 'g1', x: 250, y: 277 },
  { id: 'g2', x: 200, y: 365 },
];

// Hit radius in SVG units
const HIT_RADIUS = 32;

// Phase config
const PHASES = [
  { id: 'brush',  tool: 'brush',  icon: '🪥', name: 'Escovar',     sub: 'arrasta nos dentes amarelos',  hold: 0.55 },
  { id: 'floss',  tool: 'floss',  icon: '🧵', name: 'Fio Dental',  sub: 'passa o fio entre os dentes',  hold: 0.45 },
  { id: 'drill',  tool: 'drill',  icon: '🔧', name: 'Motorzinho',  sub: 'segura na cárie preta',        hold: 0.85 },
  { id: 'pliers', tool: 'pliers', icon: '🦷', name: 'Alicate',     sub: 'puxa o dente podre pra fora',  hold: 0.75 },
];

// ============================================================================
// STATE
// ============================================================================
let phaseIdx = 0;
let phase = PHASES[0];
let pointer = { x: 0, y: 0, active: false };
let teeth = {};       // id -> {state, progress, g, body, slot, cavityCircle}
let gapsDone = {};
let started = false;
let ended = false;
let lastFrame = performance.now();

// DOM refs
const SVG_NS = 'http://www.w3.org/2000/svg';
const svgEl = document.getElementById('mouth-svg');
const teethSvgEl = document.getElementById('teeth-svg');
const fxEl = document.getElementById('fx-layer');
const toolEl = document.getElementById('tool');
const toolImgEl = document.getElementById('tool-img');
const hudIconEl = document.querySelector('#hud-tool .icon');
const hudTextEl = document.getElementById('hud-text');
const progressFillEl = document.getElementById('progress-fill');
const progressLabelEl = document.getElementById('progress-label');
const bannerEl = document.getElementById('banner');
const bannerEmojiEl = document.getElementById('banner-emoji');
const bannerTextEl = document.getElementById('banner-text');
const bannerSubEl = document.getElementById('banner-sub');
const introEl = document.getElementById('intro');
const endEl = document.getElementById('end');

// ============================================================================
// SVG HELPERS
// ============================================================================
function svg(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

// Convert client (screen) coords -> SVG viewBox coords
function clientToSvg(cx, cy) {
  const pt = svgEl.createSVGPoint();
  pt.x = cx; pt.y = cy;
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return { x: 0, y: 0 };
  const inv = ctm.inverse();
  const out = pt.matrixTransform(inv);
  return { x: out.x, y: out.y };
}

// Convert SVG viewBox coords -> client (screen) coords
function svgToClient(x, y) {
  const pt = svgEl.createSVGPoint();
  pt.x = x; pt.y = y;
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return { x: 0, y: 0 };
  const out = pt.matrixTransform(ctm);
  return { x: out.x, y: out.y };
}

// ============================================================================
// BUILD TEETH
// ============================================================================
function buildTeeth() {
  for (const slot of TOOTH_SLOTS) {
    const g = svg('g', { class: 'tooth spawning', 'data-id': slot.id });
    g.style.transformOrigin = `${slot.x}px ${slot.y}px`;
    // base tooth body (rounded rect)
    const body = svg('rect', {
      x: slot.x - 15, y: slot.y - 17,
      width: 30, height: 34, rx: 9, ry: 9,
      class: 'tooth-body',
      stroke: '#d8c8a8', 'stroke-width': '1.5',
    });
    g.appendChild(body);
    // shine highlight
    const shine = svg('ellipse', {
      cx: slot.x - 6, cy: slot.y - 8,
      rx: 4, ry: 6,
      fill: 'rgba(255,255,255,0.55)',
      class: 'tooth-shine',
    });
    g.appendChild(shine);
    // cavity black circle (only for cavity teeth)
    let cavityCircle = null;
    if (slot.state === 'cavity') {
      cavityCircle = svg('circle', {
        cx: slot.x, cy: slot.y + 2,
        r: 7,
        fill: 'url(#cavityGrad)',
        class: 'cavity-circle',
      });
      g.appendChild(cavityCircle);
    }
    teethSvgEl.appendChild(g);

    teeth[slot.id] = { state: slot.state, progress: 0, g, body, shine, cavityCircle, slot };
    paintTooth(teeth[slot.id]);

    if (slot.state === 'rotten') g.classList.add('shake');
  }
  // Stagger pop-in animation
  setTimeout(() => {
    Object.values(teeth).forEach((t, i) => {
      setTimeout(() => {
        t.g.classList.remove('spawning');
        t.g.classList.add('spawned');
      }, i * 60);
    });
  }, 100);
}

function paintTooth(t) {
  // body fill based on current state
  if (t.state === 'clean' || t.state === 'cavity') {
    t.body.setAttribute('fill', 'url(#toothGrad)');
  } else if (t.state === 'dirty') {
    t.body.setAttribute('fill', 'url(#dirtyGrad)');
  } else if (t.state === 'rotten') {
    t.body.setAttribute('fill', 'url(#rottenGrad)');
  }
}

// ============================================================================
// INIT
// ============================================================================
function init() {
  buildTeeth();

  // Tool init
  toolImgEl.src = TOOL_IMAGES[phase.tool];
  toolEl.style.opacity = '0';

  // Pointer events
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('mousedown', onPointerDown);
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchstart', onPointerDown, { passive: false });
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('touchend', onPointerUp);

  introEl.addEventListener('click', startGame);
  introEl.addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });
  document.getElementById('cta-btn').addEventListener('click', () => {
    if (window.mraid) window.mraid.open(CTA_URL);
    else window.open(CTA_URL, '_blank');
  });

  requestAnimationFrame(loop);
}

function startGame() {
  if (started) return;
  started = true;
  introEl.classList.add('hide');
  setTimeout(() => { introEl.style.display = 'none'; }, 500);
  setPhase(0);
  initAudio();
}

// ============================================================================
// POINTER
// ============================================================================
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  if (!t) return null;
  return { clientX: t.clientX, clientY: t.clientY };
}
function onPointerMove(e) {
  const p = getPos(e);
  if (!p) return;
  e.preventDefault && e.preventDefault();
  pointer.x = p.clientX;
  pointer.y = p.clientY;
  toolEl.style.transform = `translate(${pointer.x}px, ${pointer.y}px) translate(-50%, -50%)`;
  if (started && !ended) toolEl.style.opacity = '1';
}
function onPointerDown(e) {
  const p = getPos(e);
  if (!p) return;
  e.preventDefault && e.preventDefault();
  pointer.x = p.clientX;
  pointer.y = p.clientY;
  pointer.active = true;
  toolEl.style.transform = `translate(${pointer.x}px, ${pointer.y}px) translate(-50%, -50%)`;
  if (started && !ended) {
    toolEl.style.opacity = '1';
    toolEl.classList.add('active');
  }
}
function onPointerUp() {
  pointer.active = false;
  toolEl.classList.remove('active');
}

// Pointer in SVG viewBox coords
function getPointerInSvg() {
  return clientToSvg(pointer.x, pointer.y);
}

// ============================================================================
// PHASE
// ============================================================================
function setPhase(i) {
  phaseIdx = i;
  phase = PHASES[i];
  toolImgEl.src = TOOL_IMAGES[phase.tool];
  hudIconEl.textContent = phase.icon;
  hudTextEl.textContent = phase.name;
  progressLabelEl.textContent = `FASE ${i+1}/${PHASES.length}`;
  updateProgress();
  showBanner(phase.icon, phase.name.toUpperCase(), phase.sub);
}

function showBanner(emoji, text, sub) {
  bannerEmojiEl.textContent = emoji;
  bannerTextEl.textContent = text;
  bannerSubEl.textContent = sub;
  bannerEl.classList.remove('show');
  void bannerEl.offsetWidth;
  bannerEl.classList.add('show');
  setTimeout(() => bannerEl.classList.remove('show'), 1800);
}

function updateProgress() {
  let done = 0, total = 0;
  for (const id in teeth) { const s = teeth[id].slot.state; if (s === 'dirty') { total++; if (teeth[id].state === 'clean') done++; } }
  for (const g of FLOSS_GAPS) { total++; if (gapsDone[g.id]) done++; }
  for (const id in teeth) { const s = teeth[id].slot.state; if (s === 'cavity') { total++; if (teeth[id].state === 'clean') done++; } }
  for (const id in teeth) { const s = teeth[id].slot.state; if (s === 'rotten') { total++; if (teeth[id].state === 'extracted') done++; } }
  progressFillEl.style.width = `${(done / total) * 100}%`;
}

function checkPhaseComplete() {
  if (phase.id === 'brush')  return Object.values(teeth).every(t => t.slot.state !== 'dirty' || t.state === 'clean');
  if (phase.id === 'floss')  return FLOSS_GAPS.every(g => gapsDone[g.id]);
  if (phase.id === 'drill')  return Object.values(teeth).every(t => t.slot.state !== 'cavity' || t.state === 'clean');
  if (phase.id === 'pliers') return Object.values(teeth).every(t => t.slot.state !== 'rotten' || t.state === 'extracted');
  return false;
}

function advancePhase() {
  if (phaseIdx + 1 >= PHASES.length) endGame();
  else setTimeout(() => setPhase(phaseIdx + 1), 1200);
}

function endGame() {
  ended = true;
  toolEl.style.opacity = '0';
  setTimeout(() => {
    endEl.classList.add('show');
    spawnConfetti();
  }, 800);
}

// ============================================================================
// INTERACTION
// ============================================================================
function processInteraction(dt) {
  if (!pointer.active || !started || ended) return;
  const p = getPointerInSvg();
  if (p.x < 0 || p.x > VBW || p.y < 0 || p.y > VBH) return;

  if (phase.id === 'brush')  return processBrush(dt, p);
  if (phase.id === 'floss')  return processFloss(dt, p);
  if (phase.id === 'drill')  return processDrill(dt, p);
  if (phase.id === 'pliers') return processPliers(dt, p);
}

function findClosestTooth(p, predicate) {
  let best = null, bestD = HIT_RADIUS * HIT_RADIUS;
  for (const id in teeth) {
    const t = teeth[id];
    if (!predicate(t)) continue;
    const dx = t.slot.x - p.x, dy = t.slot.y - p.y;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = t; }
  }
  return best;
}

function processBrush(dt, p) {
  const t = findClosestTooth(p, t => t.slot.state === 'dirty' && t.state === 'dirty');
  if (!t) return;
  t.progress += dt / phase.hold;
  spawnSparkleAt(p);
  // interpolate fill from dirty -> clean by mixing colors via tooth class
  const k = Math.min(1, t.progress);
  // Smooth color interp by setting an inline fill color blend
  const r1=240, g1=216, b1=133; // #f0d885
  const r2=255, g2=255, b2=255;
  const r = Math.round(r1 + (r2-r1)*k);
  const gC = Math.round(g1 + (g2-g1)*k);
  const b = Math.round(b1 + (b2-b1)*k);
  t.body.setAttribute('fill', `rgb(${r},${gC},${b})`);
  if (t.progress >= 1) {
    t.state = 'clean';
    paintTooth(t);
    burstParticles(p, ['✨','⭐','💫','💖'], 10);
    flashRing(p, '#fff');
    playPing();
    updateProgress();
    if (checkPhaseComplete()) advancePhase();
  }
}

function processFloss(dt, p) {
  let best = null, bestD = HIT_RADIUS * HIT_RADIUS;
  for (const g of FLOSS_GAPS) {
    if (gapsDone[g.id]) continue;
    const dx = g.x - p.x, dy = g.y - p.y;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = g; }
  }
  if (!best) return;
  best.progress = (best.progress || 0) + dt / phase.hold;
  spawnSparkleAt(p);
  if (best.progress >= 1) {
    gapsDone[best.id] = true;
    burstParticles(p, ['💕','✨','💖','🌟'], 10);
    flashRing(p, '#ffd0e0');
    playPing();
    updateProgress();
    if (checkPhaseComplete()) advancePhase();
  }
}

function processDrill(dt, p) {
  const t = findClosestTooth(p, t => t.slot.state === 'cavity' && t.state === 'cavity');
  if (!t) return;
  t.progress += dt / phase.hold;
  if (Math.random() < 0.5) spawnSparkleAt(p, '⚡');
  if (t.cavityCircle) {
    const r = Math.max(0, 7 * (1 - t.progress));
    t.cavityCircle.setAttribute('r', r);
  }
  if (t.progress >= 1) {
    t.state = 'clean';
    if (t.cavityCircle) { t.cavityCircle.remove(); t.cavityCircle = null; }
    paintTooth(t);
    t.g.classList.add('glow');
    setTimeout(() => t.g.classList.remove('glow'), 700);
    burstParticles(p, ['✨','⭐','💫','🌟','💎'], 14);
    flashRing(p, '#ffd040');
    playPing();
    updateProgress();
    if (checkPhaseComplete()) advancePhase();
  }
}

function processPliers(dt, p) {
  const t = findClosestTooth(p, t => t.slot.state === 'rotten' && t.state === 'rotten');
  if (!t) return;
  t.progress += dt / phase.hold;
  t.g.classList.add('shake');
  // Lift and rotate the tooth as you pull
  const lift = -40 * t.progress;
  const ang = (Math.random() - 0.5) * 8;
  t.g.style.transform = `translateY(${lift}px) rotate(${ang}deg)`;
  if (t.progress >= 1) {
    t.state = 'extracted';
    t.g.classList.remove('shake');
    // Animate fly-off
    t.g.style.transition = 'transform 0.6s ease-out, opacity 0.6s';
    t.g.style.transform = `translate(${(Math.random()-0.5)*60}px, ${-200}px) rotate(540deg) scale(0.4)`;
    t.g.style.opacity = '0';
    burstParticles(p, ['💖','⭐','✨','🌟','💫','💎'], 18);
    flashRing(p, '#ff8aa8');
    playPop();
    updateProgress();
    if (checkPhaseComplete()) advancePhase();
  }
}

// ============================================================================
// EFFECTS
// ============================================================================
function spawnSparkleAt(p, override) {
  if (Math.random() > 0.5) return;
  const c = svgToClient(p.x, p.y);
  const emoji = override || ['✨','⭐','💧'][Math.floor(Math.random()*3)];
  spawnFloatingParticle(c.x, c.y, emoji);
}

function spawnFloatingParticle(x, y, emoji) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = emoji;
  el.style.left = (x - 12) + 'px';
  el.style.top = (y - 12) + 'px';
  fxEl.appendChild(el);
  const angle = Math.random() * Math.PI * 2;
  const speed = 60 + Math.random() * 80;
  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed - 80;
  let life = 0, max = 0.7 + Math.random() * 0.3;
  const tick = () => {
    life += 0.016;
    if (life >= max) { el.remove(); return; }
    const t = life / max;
    const dx = vx * life;
    const dy = vy * life + 200 * life * life;
    el.style.transform = `translate(${dx}px, ${dy}px) scale(${1 - t * 0.5}) rotate(${life * 360}deg)`;
    el.style.opacity = (1 - t).toString();
    requestAnimationFrame(tick);
  };
  tick();
}

function burstParticles(p, emojis, count) {
  const c = svgToClient(p.x, p.y);
  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnFloatingParticle(c.x, c.y, emojis[Math.floor(Math.random() * emojis.length)]), i * 18);
  }
}

function flashRing(p, color) {
  const c = svgToClient(p.x, p.y);
  const el = document.createElement('div');
  el.className = 'flash-ring';
  el.style.borderColor = color;
  el.style.left = (c.x - 30) + 'px';
  el.style.top = (c.y - 30) + 'px';
  el.style.width = '60px';
  el.style.height = '60px';
  fxEl.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

// ============================================================================
// CONFETTI
// ============================================================================
function spawnConfetti() {
  const colors = ['#ff5a85','#ffd47a','#a8e6a3','#9ed1ff','#c89df0','#ff8aa8'];
  const container = document.getElementById('confetti');
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * window.innerWidth + 'px';
    p.style.top = (-20 - Math.random() * 100) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.transform = `rotate(${Math.random() * 360}deg)`;
    container.appendChild(p);
    const fallDur = 2.5 + Math.random() * 1.5;
    const drift = (Math.random() - 0.5) * 200;
    const startX = parseFloat(p.style.left);
    let life = 0;
    const tick = () => {
      life += 0.016;
      if (life >= fallDur) { p.remove(); return; }
      const t = life / fallDur;
      p.style.top = (window.innerHeight * t * 1.1 - 20) + 'px';
      p.style.left = (startX + drift * t) + 'px';
      p.style.transform = `rotate(${life * 720}deg)`;
      p.style.opacity = (1 - t * 0.3).toString();
      requestAnimationFrame(tick);
    };
    tick();
  }
}

// ============================================================================
// AUDIO
// ============================================================================
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) { console.warn('audio init failed:', e); }
}
function playPing() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < 2; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime([880, 1320][i], now + i*0.06);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now + i*0.06);
    g.gain.linearRampToValueAtTime(0.18, now + i*0.06 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, now + i*0.06 + 0.18);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(now + i*0.06); osc.stop(now + i*0.06 + 0.20);
  }
}
function playPop() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(60, now + 0.15);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.4, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.2);
}

// ============================================================================
// LOOP
// ============================================================================
function loop(now) {
  const dt = Math.min(0.05, (now - lastFrame) / 1000);
  lastFrame = now;
  processInteraction(dt);
  requestAnimationFrame(loop);
}

init();
</script>
