<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Fox</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#cfe;cursor:crosshair}
  canvas{display:block}
  #hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;pointer-events:none;font-size:14px;letter-spacing:2px;text-shadow:0 0 6px #000}
  #hud .hl{color:#ffe040}
  #crosshair{position:fixed;left:50%;top:50%;width:24px;height:24px;margin:-12px 0 0 -12px;pointer-events:none}
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:#ffe040;opacity:.85}
  #crosshair::before{top:11px;left:0;width:24px;height:2px}
  #crosshair::after{left:11px;top:0;width:2px;height:24px}
  #help{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:#88aabb;letter-spacing:2px}
</style>
</head>
<body>
<div id="hud">
  <div>SPACE <span class="hl">FOX</span></div>
  <div>SCORE <span class="hl" id="score">0</span></div>
</div>
<div id="crosshair"></div>
<div id="help">WASD VOAR · MOUSE MIRA · CLICK ATIRA</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6cc7ff);
scene.fog = new THREE.Fog(0x6cc7ff, 200, 900);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Lights
scene.add(new THREE.HemisphereLight(0xbfdfff, 0x335544, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(120, 200, 80);
scene.add(sun);

// ===== ARENA =====
const ARENA_R = 600;

// Ocean
const sea = new THREE.Mesh(
  new THREE.CircleGeometry(ARENA_R, 64),
  new THREE.MeshLambertMaterial({color:0x1d6fb0, flatShading:true})
);
sea.rotation.x = -Math.PI/2;
sea.position.y = 0;
scene.add(sea);

// Land islands (just a few low-poly chunks)
function island(x, z, r, h, color) {
  const g = new THREE.ConeGeometry(r, h, 5 + Math.floor(Math.random()*3));
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({color, flatShading:true}));
  m.position.set(x, h/2 - 1, z);
  m.rotation.y = Math.random()*Math.PI;
  scene.add(m);
}
for (let i = 0; i < 14; i++) {
  const a = Math.random()*Math.PI*2;
  const d = 80 + Math.random()*(ARENA_R-160);
  island(Math.cos(a)*d, Math.sin(a)*d, 25+Math.random()*40, 10+Math.random()*30,
         Math.random()<.5 ? 0x4a8a3a : 0x7a6240);
}

// Outer wall (visual boundary)
const wallG = new THREE.CylinderGeometry(ARENA_R, ARENA_R, 80, 48, 1, true);
const wall = new THREE.Mesh(wallG, new THREE.MeshBasicMaterial({color:0x88ccff, side:THREE.BackSide, transparent:true, opacity:0.15}));
wall.position.y = 30;
scene.add(wall);

// ===== PLAYER SHIP (low-poly Arwing-ish) =====
const ship = new THREE.Group();
{
  const body = new THREE.Mesh(
    new THREE.ConeGeometry(0.7, 3.2, 4),
    new THREE.MeshLambertMaterial({color:0xdddde6, flatShading:true})
  );
  body.rotation.x = Math.PI/2;
  ship.add(body);

  const cockpit = new THREE.Mesh(
    new THREE.SphereGeometry(0.45, 6, 4),
    new THREE.MeshLambertMaterial({color:0x223355, flatShading:true})
  );
  cockpit.position.set(0, 0.35, 0.2);
  cockpit.scale.set(1, 0.6, 1.2);
  ship.add(cockpit);

  const wingShape = new THREE.BoxGeometry(2.6, 0.12, 0.9);
  const wingMat = new THREE.MeshLambertMaterial({color:0xc0c4cc, flatShading:true});
  const wing = new THREE.Mesh(wingShape, wingMat);
  wing.position.set(0, -0.05, -0.2);
  ship.add(wing);

  const finL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.7), wingMat);
  finL.position.set(-1.25, 0.3, -0.2);
  ship.add(finL);
  const finR = finL.clone(); finR.position.x = 1.25;
  ship.add(finR);

  const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.55, 0.7),
    new THREE.MeshLambertMaterial({color:0xffaa30, flatShading:true}));
  tail.position.set(0, 0.45, -1.2);
  ship.add(tail);

  // engine glow
  const glow = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 4),
    new THREE.MeshBasicMaterial({color:0x40e0ff}));
  glow.position.set(0, 0, -1.6);
  ship.add(glow);
}
scene.add(ship);

const player = {
  pos: new THREE.Vector3(0, 40, 0),
  vel: new THREE.Vector3(),
  yaw: 0,    // around Y
  pitch: 0,  // up/down
  roll: 0,
  speed: 35,
};
ship.position.copy(player.pos);

// ===== INPUT =====
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });

const mouse = { x: 0, y: 0, down: false };
addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -((e.clientY / innerHeight) * 2 - 1);
});
addEventListener('mousedown', () => mouse.down = true);
addEventListener('mouseup',   () => mouse.down = false);

// ===== ENEMIES =====
const enemies = [];
function makeEnemy(x, y, z) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.OctahedronGeometry(1.4, 0),
    new THREE.MeshLambertMaterial({color:0x0a0a10, flatShading:true})
  );
  g.add(body);
  // red lights
  for (let i = 0; i < 3; i++) {
    const l = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 6, 4),
      new THREE.MeshBasicMaterial({color:0xff2020})
    );
    const a = (i / 3) * Math.PI * 2;
    l.position.set(Math.cos(a)*1.3, 0, Math.sin(a)*1.3);
    g.add(l);
  }
  g.position.set(x, y, z);
  scene.add(g);
  enemies.push({ mesh: g, hp: 20, alive: true });
}
for (let i = 0; i < 8; i++) {
  const a = Math.random() * Math.PI * 2;
  const d = 100 + Math.random() * 200;
  makeEnemy(Math.cos(a)*d, 30 + Math.random()*40, Math.sin(a)*d);
}

// ===== BULLETS =====
const bullets = [];
const bulletGeo = new THREE.SphereGeometry(0.25, 6, 4);
const bulletMat = new THREE.MeshBasicMaterial({color:0xffe040});

let shotCD = 0;
function shoot() {
  // direction = forward of ship
  const dir = new THREE.Vector3(0, 0, 1).applyEuler(ship.rotation).normalize();
  const m = new THREE.Mesh(bulletGeo, bulletMat);
  m.position.copy(ship.position).add(dir.clone().multiplyScalar(2.5));
  scene.add(m);
  bullets.push({ mesh: m, vel: dir.multiplyScalar(180), life: 2.5 });
}

// ===== SCORE =====
let score = 0;
const $score = document.getElementById('score');

// ===== LOOP =====
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(0.05, clock.getDelta());

  // --- Controls: WASD + mouse aim ---
  const turnSpeed = 1.6;
  if (keys['KeyA']) player.yaw   += turnSpeed * dt;
  if (keys['KeyD']) player.yaw   -= turnSpeed * dt;
  if (keys['KeyW']) player.pitch += turnSpeed * dt;
  if (keys['KeyS']) player.pitch -= turnSpeed * dt;
  player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));

  // gentle bank from mouse
  player.roll = -mouse.x * 0.6;

  ship.rotation.set(0, 0, 0);
  ship.rotateY(player.yaw);
  ship.rotateX(player.pitch);
  ship.rotateZ(player.roll);

  // forward motion
  const fwd = new THREE.Vector3(0, 0, 1).applyEuler(ship.rotation);
  player.pos.addScaledVector(fwd, player.speed * dt);

  // keep inside arena
  const dxz = Math.hypot(player.pos.x, player.pos.z);
  if (dxz > ARENA_R - 20) {
    const k = (ARENA_R - 20) / dxz;
    player.pos.x *= k; player.pos.z *= k;
  }
  player.pos.y = Math.max(8, Math.min(180, player.pos.y));

  ship.position.copy(player.pos);

  // --- Camera: chase behind ship ---
  const camOffset = new THREE.Vector3(0, 2.2, -8).applyEuler(ship.rotation);
  const camTarget = player.pos.clone().add(camOffset);
  camera.position.lerp(camTarget, 0.15);
  const lookAhead = player.pos.clone().add(fwd.clone().multiplyScalar(20));
  camera.lookAt(lookAhead);

  // --- Shoot ---
  shotCD -= dt;
  if (mouse.down && shotCD <= 0) {
    shoot();
    shotCD = 0.15;
  }

  // --- Bullets ---
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    let hit = false;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (b.mesh.position.distanceTo(e.mesh.position) < 1.8) {
        e.hp -= 10;
        if (e.hp <= 0) {
          e.alive = false;
          scene.remove(e.mesh);
          score += 100;
          $score.textContent = score;
        }
        hit = true;
        break;
      }
    }
    if (hit || b.life <= 0) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }

  // --- Enemies bob in place ---
  const t = performance.now() * 0.001;
  for (const e of enemies) {
    if (!e.alive) continue;
    e.mesh.rotation.y += dt * 0.6;
    e.mesh.position.y += Math.sin(t + e.mesh.position.x*0.1) * 0.02;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
