<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#fff;font-family:'Helvetica Neue','Segoe UI',Arial,sans-serif;touch-action:none}

/* ===== GATE ===== */
#gate{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a0030 0%,#000 80%);
}
#gate.hide{opacity:0;pointer-events:none;transition:opacity .5s ease}
.gate-box{
  text-align:center;padding:40px 32px;max-width:360px;width:90%;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,42,42,0.25);
  border-radius:12px;backdrop-filter:blur(10px);
}
.gate-box .lock{font-size:54px;margin-bottom:12px;filter:drop-shadow(0 4px 20px rgba(255,42,42,0.4))}
.gate-box h1{font-family:'Impact','Arial Black',sans-serif;font-size:32px;letter-spacing:3px;color:#ff2a2a;margin-bottom:8px;text-shadow:0 0 20px rgba(255,42,42,0.5)}
.gate-box p{font-size:13px;color:#aaa;margin-bottom:22px;letter-spacing:1px}
.gate-box input{
  width:100%;padding:14px 16px;font-size:18px;text-align:center;letter-spacing:6px;
  background:#0a0a0a;border:2px solid #333;color:#fff;border-radius:6px;outline:none;
  font-family:inherit;transition:border-color .2s;
}
.gate-box input:focus{border-color:#ff2a2a}
.gate-box input.bad{border-color:#ff2a2a;animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.gate-box button{
  margin-top:14px;width:100%;padding:14px;font-size:14px;font-weight:bold;letter-spacing:2px;
  background:#ff2a2a;color:#000;border:none;border-radius:6px;cursor:pointer;font-family:inherit;
  transition:background .2s,transform .1s;
}
.gate-box button:hover{background:#ff5050}
.gate-box button:active{transform:scale(0.97)}
.gate-box .err{color:#ff5050;font-size:12px;margin-top:10px;height:14px;letter-spacing:1px}
.gate-box .back{margin-top:18px;font-size:11px;color:#666;letter-spacing:1px}
.gate-box .back a{color:#888;text-decoration:underline}

/* ===== GAME UI ===== */
#game{position:fixed;inset:0}
canvas{display:block;width:100%;height:100%}

#hud{
  position:fixed;top:0;left:0;right:0;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
  pointer-events:none;z-index:10;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);
}
#hud .left,#hud .right{display:flex;align-items:center;gap:10px;pointer-events:auto}
#hud .brand{font-family:'Impact',sans-serif;font-size:20px;letter-spacing:2px;color:#ff2a2a;text-shadow:0 0 12px rgba(255,42,42,0.5)}
#hud .level{font-size:12px;color:#fff;letter-spacing:2px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}
#hud .queue-info{font-size:11px;color:#fff;letter-spacing:1.5px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}
#hud .home{
  pointer-events:auto;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);
  color:#fff;padding:8px 12px;border-radius:20px;font-size:11px;letter-spacing:1.5px;cursor:pointer;
  font-family:inherit;
}
#hud .home:hover{background:rgba(255,42,42,0.3);border-color:#ff2a2a}

#instruction{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  pointer-events:none;z-index:10;font-size:13px;color:#fff;letter-spacing:2px;
  background:rgba(0,0,0,0.55);padding:8px 16px;border-radius:20px;backdrop-filter:blur(6px);
  opacity:0;transition:opacity .4s;text-align:center;max-width:90%;
}
#instruction.show{opacity:1}

/* End screen */
#endscreen{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:50;
}
#endscreen.show{display:flex;animation:fadein .4s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
#endscreen .end-title{
  font-family:'Impact',sans-serif;font-size:72px;letter-spacing:4px;
  color:#fff;margin-bottom:20px;text-shadow:0 4px 30px rgba(0,0,0,0.7);
  animation:pop .5s cubic-bezier(.34,1.56,.64,1);
}
#endscreen.win .end-title{color:#5ee85e;text-shadow:0 0 40px rgba(94,232,94,0.6)}
#endscreen.lose .end-title{color:#ff4040;text-shadow:0 0 40px rgba(255,64,64,0.6)}
@keyframes pop{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:1}}
#endscreen .end-sub{font-size:14px;color:#bbb;letter-spacing:2px;margin-bottom:30px;text-align:center;padding:0 20px}
#endscreen button{
  padding:14px 36px;font-size:14px;font-weight:bold;letter-spacing:3px;
  background:#fff;color:#000;border:none;border-radius:6px;cursor:pointer;font-family:inherit;
  transition:transform .15s,background .2s;
}
#endscreen button:hover{background:#ddd;transform:translateY(-2px)}
#endscreen button.secondary{background:rgba(255,255,255,0.15);color:#fff;margin-top:10px;backdrop-filter:blur(8px)}
#endscreen button.secondary:hover{background:rgba(255,255,255,0.25)}

<script>
// ===== GATE LOGIC =====
const PASSWORD = '#wild';
const STORAGE_KEY = 'surtado_secret_unlocked_v1';

const gateEl = document.getElementById('gate');
const gameEl = document.getElementById('game');
const pwInput = document.getElementById('pw');
const pwBtn = document.getElementById('pwBtn');
const pwErr = document.getElementById('pwErr');

function unlock() {
  gateEl.classList.add('hide');
  setTimeout(() => {
    gateEl.style.display = 'none';
    gameEl.style.display = 'block';
    bootGame();
  }, 500);
}

function tryPassword() {
  const v = pwInput.value.trim();
  if (v === PASSWORD) {
    sessionStorage.setItem(STORAGE_KEY, '1');
    unlock();
  } else {
    pwInput.classList.add('bad');
    pwErr.textContent = 'WRONG CODE';
    setTimeout(() => { pwInput.classList.remove('bad'); pwErr.textContent=''; }, 700);
    pwInput.value = '';
    pwInput.focus();
  }
}

pwBtn.addEventListener('click', tryPassword);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });

if (sessionStorage.getItem(STORAGE_KEY) === '1') {
  gateEl.style.display = 'none';
  gameEl.style.display = 'block';
  window.__skipGate = true;
}
</script>

<script type="module">
import * as THREE from 'three';

// ===== GAME CONFIG =====
const COLORS = {
  red:    0xe43a3a,
  blue:   0x3da6ff,
  yellow: 0xffd23a,
  green:  0x5ed14a,
  purple: 0xb24dff,
  orange: 0xff8a3a,
};

const TRUCK_CAPACITY = 5;     // cars per truck
const ACTIVE_TRUCKS = 3;      // visible truck slots
const RESERVE_SLOTS = 5;      // reserve parking
const TRUCK_X = [-4.2, 0, 4.2];

// Levels: grid of cars + queue of single-color trucks
// total cars in grid must equal sum of truck capacities (truck count × TRUCK_CAPACITY)
const LEVELS = [
  // L1: 3 trucks (one of each color), simple
  {
    grid: [
      ['red','blue','yellow','red','blue'],
      ['yellow','red','blue','yellow','red'],
      ['blue','yellow','red','blue','yellow'],
    ],
    truckQueue: ['red','blue','yellow'],
  },
  // L2: 4 trucks, two of same color
  {
    grid: [
      ['red','blue','green','red','blue'],
      ['green','red','blue','green','red'],
      ['blue','green','red','blue','green'],
      ['red','blue','green','red','blue'],
    ],
    truckQueue: ['red','blue','green','red'],
  },
  // L3: 5 trucks, 4 colors
  {
    grid: [
      ['red','blue','green','yellow','red'],
      ['blue','green','yellow','red','blue'],
      ['green','yellow','red','blue','green'],
      ['yellow','red','blue','green','yellow'],
      ['red','blue','green','yellow','red'],
    ],
    truckQueue: ['red','blue','green','yellow','red'],
  },
];

// ===== STATE =====
let scene, camera, renderer, clock;
let raycaster, pointer;
let cars = [];                    // all cars on the grid (clickable)
let reserveSlots = [];            // {x,z,occupied:car|null}
let activeTrucks = [null,null,null]; // 3 truck objects (or null = empty station)
let truckQueue = [];              // remaining trucks to spawn, queue of color names
let totalTrucksThisLevel = 0;
let trucksDeliveredThisLevel = 0;
let level = 0, gameLocked = false;
let animations = [];
let tutorialHand = null;

function bootGame() {
  if (renderer) return;
  setupScene();
  bindInput();
  loadLevel(0);
  animate();
  showInstruction('TAP CARS — same color → truck · others → reserve (5 max)', 4000);
}
window.bootGame = bootGame;
if (window.__skipGate) bootGame();

// ===== SCENE =====
function setupScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x5cd0ff);
  scene.fog = new THREE.Fog(0x5cd0ff, 22, 48);

  camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0, 11, 11);
  camera.lookAt(0, 0, -1);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('game').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(5, 14, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -16; sun.shadow.camera.right = 16;
  sun.shadow.camera.top = 16; sun.shadow.camera.bottom = -16;
  scene.add(sun);

  // road
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 36),
    new THREE.MeshLambertMaterial({ color: 0x575b82 })
  );
  road.rotation.x = -Math.PI/2;
  road.position.set(0, 0, -2);
  road.receiveShadow = true;
  scene.add(road);

  // road dashes
  const dashMat = new THREE.MeshBasicMaterial({ color: 0xfff2c4 });
  for (let i = -14; i <= 14; i += 2.5) {
    const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.18, 1), dashMat);
    dash.rotation.x = -Math.PI/2;
    dash.position.set(0, 0.01, i);
    scene.add(dash);
  }

  // sea both sides
  const seaMat = new THREE.MeshLambertMaterial({ color: 0x51e6ff });
  for (const sx of [-20, 20]) {
    const sea = new THREE.Mesh(new THREE.PlaneGeometry(20, 36), seaMat);
    sea.rotation.x = -Math.PI/2;
    sea.position.set(sx, -0.2, -2);
    scene.add(sea);
  }

  // curbs
  const curbMat = new THREE.MeshLambertMaterial({ color: 0xf2e6d8 });
  for (const cx of [-10.3, 10.3]) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 36), curbMat);
    c.position.set(cx, 0.15, -2);
    c.receiveShadow = true; c.castShadow = true;
    scene.add(c);
  }

  // tutorial hand
  const handMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  tutorialHand = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 12), handMat);
  tutorialHand.visible = false;
  scene.add(tutorialHand);

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();
  clock = new THREE.Clock();
  addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

// ===== CAR FACTORY =====
function makeCar(colorName) {
  const group = new THREE.Group();
  const color = COLORS[colorName];

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.85, 0.45, 1.4),
    new THREE.MeshLambertMaterial({ color })
  );
  body.position.y = 0.32; body.castShadow = true; group.add(body);

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(0.75, 0.32, 0.7),
    new THREE.MeshLambertMaterial({ color: shadeColor(color, -0.25) })
  );
  cabin.position.set(0, 0.72, -0.05); cabin.castShadow = true; group.add(cabin);

  const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const wheelGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.1, 12);
  for (const [x, z] of [[-0.4,0.45],[0.4,0.45],[-0.4,-0.45],[0.4,-0.45]]) {
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI/2; w.position.set(x, 0.13, z); group.add(w);
  }

  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  for (const ex of [-0.18, 0.18]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 12, 8), eyeMat);
    eye.position.set(ex, 0.7, 0.35); group.add(eye);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 6), pupilMat);
    pupil.position.set(ex, 0.7, 0.42); group.add(pupil);
  }

  group.userData.colorName = colorName;
  group.userData.bodyMat = body.material;
  return group;
}

function shadeColor(hex, pct) {
  const r = (hex>>16)&0xff, g = (hex>>8)&0xff, b = hex&0xff;
  const t = pct < 0 ? 0 : 255, p = Math.abs(pct);
  return ((Math.round((t-r)*p)+r) << 16) | ((Math.round((t-g)*p)+g) << 8) | (Math.round((t-b)*p)+b);
}

// ===== TRUCK FACTORY =====
// single-color truck with TRUCK_CAPACITY slot markers
function makeTruck(colorName) {
  const group = new THREE.Group();
  const color = COLORS[colorName];
  const slotW = 0.95, totalW = slotW * TRUCK_CAPACITY;

  // cargo bed (colored to indicate truck color)
  const bed = new THREE.Mesh(
    new THREE.BoxGeometry(totalW + 0.4, 0.35, 1.6),
    new THREE.MeshLambertMaterial({ color: shadeColor(color, -0.45) })
  );
  bed.position.y = 0.4; bed.castShadow = true; group.add(bed);

  // colored stripe along the side, indicating the truck's color clearly
  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(totalW + 0.45, 0.12, 0.05),
    new THREE.MeshBasicMaterial({ color })
  );
  stripe.position.set(0, 0.55, 0.82); group.add(stripe);
  const stripe2 = stripe.clone(); stripe2.position.z = -0.82; group.add(stripe2);

  // cabin (front-left)
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.85, 1.4),
    new THREE.MeshLambertMaterial({ color: 0x6b6b78 })
  );
  cabin.position.set(-(totalW/2 + 0.8), 0.65, 0); cabin.castShadow = true; group.add(cabin);

  const wind = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 0.4, 1.3),
    new THREE.MeshLambertMaterial({ color: 0x222230 })
  );
  wind.position.set(-(totalW/2 + 0.8), 1.0, 0); group.add(wind);

  // wheels
  const wMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const wGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.12, 14);
  for (const x of [-(totalW/2 + 1.2), -(totalW/2 + 0.4), -0.5, totalW/2 - 0.2]) {
    for (const z of [-0.65, 0.65]) {
      const w = new THREE.Mesh(wGeo, wMat);
      w.rotation.z = Math.PI/2; w.position.set(x, 0.22, z); group.add(w);
    }
  }

  // SLOTS — colored markers showing all are the same color (truck color)
  const slots = [];
  for (let i = 0; i < TRUCK_CAPACITY; i++) {
    const x = -totalW/2 + slotW/2 + i * slotW;
    const marker = new THREE.Mesh(
      new THREE.BoxGeometry(slotW * 0.85, 0.05, 1.3),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 })
    );
    marker.position.set(x, 0.6, 0); group.add(marker);

    const outline = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(slotW * 0.85, 0.06, 1.3)),
      new THREE.LineBasicMaterial({ color: 0xffffff })
    );
    outline.position.set(x, 0.6, 0); group.add(outline);

    slots.push({ localX: x, marker, outline, filled: false, car: null });
  }

  group.userData.colorName = colorName;
  group.userData.slots = slots;
  group.userData.totalW = totalW;
  return group;
}

// ===== RESERVE AREA =====
function makeReserveArea() {
  // 5 floor markers
  for (let i = 0; i < RESERVE_SLOTS; i++) {
    const x = (i - (RESERVE_SLOTS - 1)/2) * 1.05;
    const z = 1.0;
    const pad = new THREE.Mesh(
      new THREE.BoxGeometry(0.95, 0.04, 1.5),
      new THREE.MeshLambertMaterial({ color: 0xf2e6d8 })
    );
    pad.position.set(x, 0.02, z); pad.receiveShadow = true;
    scene.add(pad);

    const outline = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(0.95, 0.05, 1.5)),
      new THREE.LineDashedMaterial({ color: 0x444466, dashSize: 0.2, gapSize: 0.1 })
    );
    outline.computeLineDistances();
    outline.position.set(x, 0.05, z); scene.add(outline);

    reserveSlots.push({ x, z, pad, outline, car: null });
  }
}

// ===== LEVEL LOAD =====
function loadLevel(idx) {
  // clear cars
  for (const c of cars) scene.remove(c);
  cars = [];
  // clear reserve cars
  for (const r of reserveSlots) {
    if (r.car) { scene.remove(r.car); r.car = null; }
  }
  // remove reserve pads (they get re-added)
  // (actually let's rebuild only on first level load)
  if (reserveSlots.length === 0) makeReserveArea();
  for (const r of reserveSlots) r.car = null;
  // clear active trucks
  for (let i = 0; i < ACTIVE_TRUCKS; i++) {
    if (activeTrucks[i]) { scene.remove(activeTrucks[i]); activeTrucks[i] = null; }
  }
  animations = [];
  gameLocked = false;
  hideEnd();
  hideTutorial();

  level = idx;
  const data = LEVELS[idx];
  document.getElementById('lvl').textContent = `LEVEL ${idx + 1}`;

  // build truck queue
  truckQueue = [...data.truckQueue];
  totalTrucksThisLevel = data.truckQueue.length;
  trucksDeliveredThisLevel = 0;

  // place cars in grid (back of road)
  const rows = data.grid.length;
  const cols = data.grid[0].length;
  const spacingX = 1.05, spacingZ = 1.55;
  const startZ = -3.0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const colorName = data.grid[r][c];
      if (!colorName) continue;
      const car = makeCar(colorName);
      car.position.set(
        (c - (cols - 1)/2) * spacingX,
        0,
        startZ - r * spacingZ
      );
      car.userData.tappable = true;
      car.userData.location = 'grid';
      scene.add(car);
      cars.push(car);
    }
  }

  // spawn first 3 trucks
  for (let i = 0; i < ACTIVE_TRUCKS; i++) spawnTruckAt(i);

  updateQueueInfo();
  setTimeout(() => showTutorial(), 700);
}

function spawnTruckAt(stationIndex) {
  if (truckQueue.length === 0) return;
  const colorName = truckQueue.shift();
  const truck = makeTruck(colorName);
  // start off-screen above (negative z) and slide forward into station
  const targetX = TRUCK_X[stationIndex];
  truck.position.set(targetX, 0, 8);
  truck.userData.targetZ = 5.0;
  truck.userData.station = stationIndex;
  scene.add(truck);
  activeTrucks[stationIndex] = truck;

  // slide-in animation
  const t0 = clock.getElapsedTime();
  const dur = 0.5;
  const startZ = truck.position.z;
  const targetZ = 5.0;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeOutCubic(t);
      truck.position.z = startZ + (targetZ - startZ) * e;
      if (t >= 1) { truck.position.z = targetZ; return true; }
      return false;
    }
  });
  updateQueueInfo();
}

function updateQueueInfo() {
  const remaining = truckQueue.length;
  document.getElementById('queueInfo').textContent = `QUEUE: ${remaining}`;
}

// ===== TUTORIAL =====
function showTutorial() {
  if (gameLocked) return;
  // find the first car whose color matches an active truck with space
  for (const car of cars) {
    if (!car.userData.tappable) continue;
    const truck = findTruckWithSpace(car.userData.colorName);
    if (truck) {
      tutorialHand.visible = true;
      tutorialHand.position.set(car.position.x, 1.3, car.position.z);
      tutorialHand.userData.t0 = clock.getElapsedTime();
      return;
    }
  }
  hideTutorial();
}
function hideTutorial() { tutorialHand.visible = false; }

// ===== INPUT =====
function bindInput() {
  renderer.domElement.addEventListener('pointerdown', onTap);
}

function onTap(e) {
  if (gameLocked) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const tappables = [];
  for (const c of cars) if (c.userData.tappable) tappables.push(c);
  for (const r of reserveSlots) if (r.car && r.car.userData.tappable) tappables.push(r.car);

  const hits = raycaster.intersectObjects(tappables, true);
  if (!hits.length) return;
  let car = hits[0].object;
  while (car.parent && !car.userData.tappable) car = car.parent;
  if (!car.userData.tappable) return;
  routeCar(car);
}

// ===== CORE LOGIC: route car to truck or reserve =====
function findTruckWithSpace(colorName) {
  for (const t of activeTrucks) {
    if (!t) continue;
    if (t.userData.colorName !== colorName) continue;
    const slots = t.userData.slots;
    const free = slots.find(s => !s.filled);
    if (free) return { truck: t, slot: free };
  }
  return null;
}

function findFreeReserveSlot() {
  return reserveSlots.find(r => !r.car) || null;
}

function routeCar(car) {
  hideTutorial();
  car.userData.tappable = false;

  const colorName = car.userData.colorName;
  const match = findTruckWithSpace(colorName);

  if (match) {
    // remove from previous location (grid or reserve)
    if (car.userData.location === 'reserve') {
      const r = reserveSlots.find(rs => rs.car === car);
      if (r) r.car = null;
    } else {
      // grid: remove from cars array
      cars = cars.filter(c => c !== car);
    }
    car.userData.location = 'truck';
    flyCarToSlot(car, match.truck, match.slot, () => {
      checkTruckFilled(match.truck);
      // after slot fills, see if any reserve cars can now flow to this truck (or any active)
      flushReserveToTrucks();
      if (!gameLocked) setTimeout(() => showTutorial(), 200);
    });
  } else {
    // no matching active truck → goes to reserve
    const reserve = findFreeReserveSlot();
    if (!reserve) {
      // reserve full + no truck: FAIL — but only count if grid car
      // for fairness: if tapped car is already in reserve, this can't happen
      // for grid car: lose the game
      if (car.userData.location === 'grid') {
        // shake red, lose
        flashCarRed(car);
        gameLocked = true;
        setTimeout(() => lose('reserve full and no matching truck'), 700);
        return;
      } else {
        // already in reserve, no truck of its color → just unlock tap and ignore
        car.userData.tappable = true;
        return;
      }
    }
    // grid → reserve
    cars = cars.filter(c => c !== car);
    car.userData.location = 'reserve';
    reserve.car = car;
    flyCarToReserve(car, reserve, () => {
      car.userData.tappable = true;
      if (!gameLocked) setTimeout(() => showTutorial(), 200);
    });
  }
}

function flushReserveToTrucks() {
  // iterate reserve slots: any car that now has a matching active truck flows over
  for (const r of reserveSlots) {
    if (!r.car) continue;
    const car = r.car;
    const match = findTruckWithSpace(car.userData.colorName);
    if (match) {
      r.car = null;
      car.userData.tappable = false;
      car.userData.location = 'truck';
      flyCarToSlot(car, match.truck, match.slot, () => {
        checkTruckFilled(match.truck);
        flushReserveToTrucks(); // chain
      });
      return; // only one per call to keep animation clean
    }
  }
}

function checkTruckFilled(truck) {
  const allFilled = truck.userData.slots.every(s => s.filled);
  if (!allFilled) return;
  // truck drives away (to the right, off screen) and next from queue spawns
  const station = truck.userData.station;
  activeTrucks[station] = null;
  trucksDeliveredThisLevel++;
  // animate drive-away
  const t0 = clock.getElapsedTime();
  const startX = truck.position.x;
  const dur = 0.8;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      truck.position.x = startX + 18 * easeInCubic(t);
      truck.position.y = -t * 0.05;
      if (t >= 1) {
        scene.remove(truck);
        // spawn next from queue, if any
        if (truckQueue.length > 0) {
          spawnTruckAt(station);
          // after new truck arrives, reserve cars matching its color may flow
          setTimeout(() => flushReserveToTrucks(), 600);
        } else {
          // queue empty — check win
          checkWin();
        }
        return true;
      }
      return false;
    }
  });
  updateQueueInfo();
}

function checkWin() {
  // win when all trucks delivered AND no reserve cars remain unmatched
  if (truckQueue.length === 0 && activeTrucks.every(t => !t)) {
    win();
  }
}

// ===== ANIMATIONS =====
function flyCarToSlot(car, truck, slot, onDone) {
  slot.filled = true;
  slot.car = car;
  slot.marker.material.opacity = 0;

  const startPos = car.position.clone();
  const targetWorld = new THREE.Vector3(slot.localX, 0.6, 0);
  truck.localToWorld(targetWorld);

  const peakY = 1.8;
  const t0 = clock.getElapsedTime();
  const dur = 0.6;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeInOutCubic(t);
      car.position.x = startPos.x + (targetWorld.x - startPos.x) * e;
      car.position.z = startPos.z + (targetWorld.z - startPos.z) * e;
      car.position.y = startPos.y + (targetWorld.y - startPos.y) * e + Math.sin(t * Math.PI) * peakY;
      car.rotation.y = (targetWorld.x < startPos.x ? -1 : 1) * Math.sin(t * Math.PI) * 0.3;
      if (t >= 1) {
        car.position.copy(targetWorld);
        car.rotation.y = 0;
        bounce(car, 0.18, 0.25);
        if (onDone) onDone();
        return true;
      }
      return false;
    }
  });
}

function flyCarToReserve(car, reserve, onDone) {
  const startPos = car.position.clone();
  const target = new THREE.Vector3(reserve.x, 0, reserve.z);
  const peakY = 1.6;
  const t0 = clock.getElapsedTime();
  const dur = 0.55;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeInOutCubic(t);
      car.position.x = startPos.x + (target.x - startPos.x) * e;
      car.position.z = startPos.z + (target.z - startPos.z) * e;
      car.position.y = startPos.y + Math.sin(t * Math.PI) * peakY;
      if (t >= 1) {
        car.position.set(target.x, 0, target.z);
        bounce(car, 0.12, 0.2);
        if (onDone) onDone();
        return true;
      }
      return false;
    }
  });
}

function bounce(obj, amt, dur) {
  const t0 = clock.getElapsedTime();
  const startY = obj.position.y;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      obj.position.y = startY + Math.sin(t * Math.PI) * amt;
      if (t >= 1) { obj.position.y = startY; return true; }
      return false;
    }
  });
}

function flashCarRed(car) {
  const t0 = clock.getElapsedTime();
  const startX = car.position.x;
  const dur = 0.5;
  const bodyMat = car.userData.bodyMat;
  const orig = bodyMat.color.getHex();
  bodyMat.color.setHex(0xff2020);
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      car.position.x = startX + Math.sin(t * 30) * 0.15 * (1 - t);
      if (t >= 1) {
        car.position.x = startX;
        bodyMat.color.setHex(orig);
        return true;
      }
      return false;
    }
  });
}

function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t) { return t*t*t; }

// ===== UI =====
function showInstruction(text, ms = 2500) {
  const el = document.getElementById('instruction');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

const endEl = document.getElementById('endscreen');
const endTitleEl = document.getElementById('endTitle');
const endSubEl = document.getElementById('endSub');
const nextBtn = document.getElementById('nextBtn');
const retryBtn = document.getElementById('retryBtn');

function win() {
  gameLocked = true;
  endTitleEl.textContent = 'YOU WIN!';
  endSubEl.textContent = level + 1 < LEVELS.length ? 'on to the next level' : 'all levels cleared!';
  nextBtn.textContent = level + 1 < LEVELS.length ? 'NEXT LEVEL' : 'PLAY AGAIN';
  endEl.className = 'show win';
}

function lose(reason) {
  gameLocked = true;
  endTitleEl.textContent = 'YOU FAIL!';
  endSubEl.textContent = reason || 'no moves left';
  nextBtn.textContent = 'TRY AGAIN';
  endEl.className = 'show lose';
}

function hideEnd() { endEl.className = ''; }

nextBtn.addEventListener('click', () => {
  if (endEl.classList.contains('win') && level + 1 < LEVELS.length) loadLevel(level + 1);
  else loadLevel(0);
});
retryBtn.addEventListener('click', () => loadLevel(level));

// ===== LOOP =====
function animate() {
  requestAnimationFrame(animate);
  const now = clock.getElapsedTime();
  animations = animations.filter(a => !a.update(now));
  if (tutorialHand.visible) {
    tutorialHand.position.y = 1.3 + Math.sin(now * 4) * 0.15;
  }
  renderer.render(scene, camera);
}
</script>
