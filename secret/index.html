<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>SURTADO.GAMES — secret</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#fff;font-family:'Helvetica Neue','Segoe UI',Arial,sans-serif;touch-action:none}

/* ===== GATE ===== */
#gate{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a0030 0%,#000 80%);
}
#gate.hide{opacity:0;pointer-events:none;transition:opacity .5s ease}
.gate-box{
  text-align:center;padding:40px 32px;max-width:360px;width:90%;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,42,42,0.25);
  border-radius:12px;backdrop-filter:blur(10px);
}
.gate-box .lock{font-size:54px;margin-bottom:12px;filter:drop-shadow(0 4px 20px rgba(255,42,42,0.4))}
.gate-box h1{font-family:'Impact','Arial Black',sans-serif;font-size:32px;letter-spacing:3px;color:#ff2a2a;margin-bottom:8px;text-shadow:0 0 20px rgba(255,42,42,0.5)}
.gate-box p{font-size:13px;color:#aaa;margin-bottom:22px;letter-spacing:1px}
.gate-box input{
  width:100%;padding:14px 16px;font-size:18px;text-align:center;letter-spacing:6px;
  background:#0a0a0a;border:2px solid #333;color:#fff;border-radius:6px;outline:none;
  font-family:inherit;transition:border-color .2s;
}
.gate-box input:focus{border-color:#ff2a2a}
.gate-box input.bad{border-color:#ff2a2a;animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.gate-box button{
  margin-top:14px;width:100%;padding:14px;font-size:14px;font-weight:bold;letter-spacing:2px;
  background:#ff2a2a;color:#000;border:none;border-radius:6px;cursor:pointer;font-family:inherit;
  transition:background .2s,transform .1s;
}
.gate-box button:hover{background:#ff5050}
.gate-box button:active{transform:scale(0.97)}
.gate-box .err{color:#ff5050;font-size:12px;margin-top:10px;height:14px;letter-spacing:1px}
.gate-box .back{margin-top:18px;font-size:11px;color:#666;letter-spacing:1px}
.gate-box .back a{color:#888;text-decoration:underline}

/* ===== GAME UI ===== */
#game{position:fixed;inset:0}
canvas{display:block;width:100%;height:100%}

#hud{
  position:fixed;top:0;left:0;right:0;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
  pointer-events:none;z-index:10;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);
}
#hud .left,#hud .right{display:flex;align-items:center;gap:10px;pointer-events:auto;flex-wrap:wrap}
#hud .brand{font-family:'Impact',sans-serif;font-size:20px;letter-spacing:2px;color:#ff2a2a;text-shadow:0 0 12px rgba(255,42,42,0.5)}
#hud .pill{font-size:12px;color:#fff;letter-spacing:2px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}
#hud .pill.timer{font-family:'Impact',sans-serif;font-size:16px;min-width:70px;text-align:center}
#hud .pill.timer.warn{color:#ff8a3a;border-color:#ff8a3a}
#hud .pill.timer.crit{color:#ff4040;border-color:#ff4040;animation:pulse-crit .5s ease-in-out infinite}
@keyframes pulse-crit{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#hud .pill.progress{display:flex;align-items:center;gap:6px}
#hud .pill .dot{width:10px;height:10px;border-radius:50%;background:#444;transition:background .3s,transform .3s}
#hud .pill .dot.done{background:#5ee85e;transform:scale(1.2);box-shadow:0 0 8px rgba(94,232,94,0.7)}
#hud .home{
  pointer-events:auto;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);
  color:#fff;padding:8px 12px;border-radius:20px;font-size:11px;letter-spacing:1.5px;cursor:pointer;
  font-family:inherit;
}
#hud .home:hover{background:rgba(255,42,42,0.3);border-color:#ff2a2a}

#instruction{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  pointer-events:none;z-index:10;font-size:13px;color:#fff;letter-spacing:2px;
  background:rgba(0,0,0,0.55);padding:8px 16px;border-radius:20px;backdrop-filter:blur(6px);
  opacity:0;transition:opacity .4s;text-align:center;max-width:90%;
}
#instruction.show{opacity:1}

/* truck completion popup */
#popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:25;pointer-events:none;
  font-family:'Impact',sans-serif;font-size:60px;letter-spacing:4px;
  color:#5ee85e;text-shadow:0 0 30px rgba(94,232,94,0.8),0 4px 20px rgba(0,0,0,0.6);
  transition:transform .25s cubic-bezier(.34,1.8,.64,1),opacity .35s;
  opacity:0;
}
#popup.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#popup.hide{transform:translate(-50%,-50%) scale(1.4);opacity:0}

/* End screen */
#endscreen{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);z-index:50;
}
#endscreen.show{display:flex;animation:fadein .4s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
#endscreen .end-title{
  font-family:'Impact',sans-serif;font-size:78px;letter-spacing:4px;
  color:#fff;margin-bottom:20px;text-shadow:0 4px 30px rgba(0,0,0,0.7);
  animation:pop .5s cubic-bezier(.34,1.56,.64,1);
}
#endscreen.win .end-title{color:#5ee85e;text-shadow:0 0 40px rgba(94,232,94,0.6)}
#endscreen.lose .end-title{color:#ff4040;text-shadow:0 0 40px rgba(255,64,64,0.6)}
@keyframes pop{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:1}}
#endscreen .end-sub{font-size:16px;color:#bbb;letter-spacing:2px;margin-bottom:30px;text-align:center;padding:0 20px}
#endscreen .stats{display:flex;gap:20px;margin-bottom:30px}
#endscreen .stats .stat{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  padding:12px 22px;border-radius:8px;text-align:center;
}
#endscreen .stats .stat-val{font-family:'Impact',sans-serif;font-size:28px;color:#fff}
#endscreen.win .stats .stat-val{color:#ffd23a}
#endscreen .stats .stat-lbl{font-size:10px;color:#888;letter-spacing:2px;margin-top:2px}
#endscreen button{
  padding:16px 40px;font-size:15px;font-weight:bold;letter-spacing:3px;
  background:#fff;color:#000;border:none;border-radius:6px;cursor:pointer;font-family:inherit;
  transition:transform .15s,background .2s;
}
#endscreen button:hover{background:#ddd;transform:translateY(-2px)}
#endscreen button.secondary{background:rgba(255,255,255,0.15);color:#fff;margin-top:10px;backdrop-filter:blur(8px)}
#endscreen button.secondary:hover{background:rgba(255,255,255,0.25)}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:40;overflow:hidden}
.confetti-piece{
  position:absolute;width:10px;height:14px;top:-30px;
  animation:confetti-fall linear forwards;
}
@keyframes confetti-fall{
  0%{transform:translateY(-30px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0.7}
}
</style>
</head>

<script>
// ===== ERROR OVERLAY (so we can debug without dev tools) =====
window.addEventListener('error', e => {
  const msg = (e.message || 'unknown') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?');
  showOverlayError(msg);
});
window.addEventListener('unhandledrejection', e => {
  showOverlayError('promise: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
});
function showOverlayError(msg) {
  let box = document.getElementById('errbox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errbox';
    box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#a00;color:#fff;padding:10px 14px;font:12px monospace;z-index:9999;max-height:40vh;overflow:auto;white-space:pre-wrap;border-top:2px solid #ff5050';
    document.body.appendChild(box);
  }
  box.textContent += msg + '\n';
}

// ===== GATE LOGIC =====
// Flip GATE_ENABLED back to true to require the password again.
const GATE_ENABLED = false;
const PASSWORD = '#wild';
const STORAGE_KEY = 'surtado_secret_unlocked_v1';

const gateEl = document.getElementById('gate');
const gameEl = document.getElementById('game');
const pwInput = document.getElementById('pw');
const pwBtn = document.getElementById('pwBtn');
const pwErr = document.getElementById('pwErr');

function unlock() {
  gateEl.classList.add('hide');
  setTimeout(() => {
    gateEl.style.display = 'none';
    gameEl.style.display = 'block';
    bootGame();
  }, 500);
}

function tryPassword() {
  const v = pwInput.value.trim();
  if (v === PASSWORD) {
    sessionStorage.setItem(STORAGE_KEY, '1');
    unlock();
  } else {
    pwInput.classList.add('bad');
    pwErr.textContent = 'WRONG CODE';
    setTimeout(() => { pwInput.classList.remove('bad'); pwErr.textContent=''; }, 700);
    pwInput.value = '';
    pwInput.focus();
  }
}

pwBtn.addEventListener('click', tryPassword);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });

if (!GATE_ENABLED || sessionStorage.getItem(STORAGE_KEY) === '1') {
  gateEl.style.display = 'none';
  gameEl.style.display = 'block';
  window.__skipGate = true;
}
</script>

<script type="module">
import * as THREE from 'three';

// ===== CONFIG =====
const COLORS = {
  red:    0xe43a3a,
  blue:   0x3da6ff,
  yellow: 0xffd23a,
  green:  0x5ed14a,
  purple: 0xb24dff,
  orange: 0xff8a3a,
};

const TRUCK_CAPACITY = 3;
const ACTIVE_TRUCKS = 3;
const RESERVE_SLOTS = 5;
const TRUCK_X = [-5, 0, 5];

// Levels: cols × rows of cars (each col is front-to-back).
// Only the FRONT car of each column is clickable.
// truckColors = the 3 truck colors.
// Distractor colors = anything in `grid` not in truckColors → goes to reserve forever.
const LEVELS = [
  // L1: 3 cols × 5 rows, 6 green distractors — pushes reserve to its limit
  {
    timer: 60,
    truckColors: ['red', 'yellow', 'blue'],
    grid: [
      ['green', 'red', 'yellow', 'blue', 'green'],
      ['yellow', 'green', 'red', 'red', 'green'],
      ['blue', 'green', 'yellow', 'blue', 'green'],
    ],
  },
  // L2: 3 distractors, 3 cols × 4 rows
  {
    timer: 70,
    truckColors: ['red', 'yellow', 'blue'],
    grid: [
      ['green', 'red', 'red', 'red'],
      ['yellow', 'green', 'yellow', 'yellow'],
      ['blue', 'blue', 'green', 'blue'],
    ],
  },
  // L3: harder, 4 cols × 3 rows, 3 distractors
  {
    timer: 80,
    truckColors: ['red', 'yellow', 'blue'],
    grid: [
      ['purple', 'red', 'red'],
      ['yellow', 'green', 'yellow'],
      ['blue', 'red', 'blue'],
      ['green', 'yellow', 'blue'],
    ],
  },
];

// ===== STATE =====
let scene, camera, renderer, clock;
let raycaster, pointer;
let columns = [];                 // columns[c] = array of cars (front-to-back)
let allCars = [];                 // all car groups in scene
let reserveSlots = [];            // {x,z,car}
let reserveBuilt = false;
let activeTrucks = [null,null,null];
let truckQueue = [];              // remaining truck colors to spawn
let trucksDone = 0;
let level = 0;
let gameLocked = false;
let timerSeconds = 0;
let timerStartTime = 0;
let timerInterval = null;
let animations = [];
let tutorialHand = null;

function bootGame() {
  if (renderer) return;
  setupScene();
  bindInput();
  loadLevel(0);
  animate();
  showInstruction('TAP THE FRONT CAR — match colors to the trucks', 4500);
}
window.bootGame = bootGame;

// ===== SCENE =====
function setupScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x5cd0ff);
  scene.fog = new THREE.Fog(0x5cd0ff, 24, 50);

  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0, 13, 12);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('game').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(5, 14, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -16; sun.shadow.camera.right = 16;
  sun.shadow.camera.top = 16; sun.shadow.camera.bottom = -16;
  scene.add(sun);

  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(22, 38),
    new THREE.MeshLambertMaterial({ color: 0x575b82 })
  );
  road.rotation.x = -Math.PI/2;
  road.position.set(0, 0, -1);
  road.receiveShadow = true;
  scene.add(road);

  const dashMat = new THREE.MeshBasicMaterial({ color: 0xfff2c4 });
  for (let i = -16; i <= 16; i += 2.5) {
    const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.18, 1), dashMat);
    dash.rotation.x = -Math.PI/2;
    dash.position.set(0, 0.01, i);
    scene.add(dash);
  }

  const seaMat = new THREE.MeshLambertMaterial({ color: 0x51e6ff });
  for (const sx of [-22, 22]) {
    const sea = new THREE.Mesh(new THREE.PlaneGeometry(20, 38), seaMat);
    sea.rotation.x = -Math.PI/2;
    sea.position.set(sx, -0.2, -1);
    scene.add(sea);
  }

  const curbMat = new THREE.MeshLambertMaterial({ color: 0xf2e6d8 });
  for (const cx of [-11.3, 11.3]) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 38), curbMat);
    c.position.set(cx, 0.15, -1);
    c.receiveShadow = true; c.castShadow = true;
    scene.add(c);
  }

  const handMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  tutorialHand = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 12), handMat);
  tutorialHand.visible = false;
  scene.add(tutorialHand);

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();
  clock = new THREE.Clock();
  addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

// ===== CAR =====
function makeCar(colorName, withEyes = true) {
  const group = new THREE.Group();
  const color = COLORS[colorName];

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.85, 0.45, 1.4),
    new THREE.MeshLambertMaterial({ color })
  );
  body.position.y = 0.32; body.castShadow = true; group.add(body);

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(0.75, 0.32, 0.7),
    new THREE.MeshLambertMaterial({ color: shadeColor(color, -0.25) })
  );
  cabin.position.set(0, 0.72, -0.05); cabin.castShadow = true; group.add(cabin);

  const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const wheelGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.1, 12);
  for (const [x, z] of [[-0.4,0.45],[0.4,0.45],[-0.4,-0.45],[0.4,-0.45]]) {
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI/2; w.position.set(x, 0.13, z); group.add(w);
  }

  if (withEyes) {
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
    for (const ex of [-0.18, 0.18]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 12, 8), eyeMat);
      eye.position.set(ex, 0.7, 0.35); group.add(eye);
      group.userData['eye_'+ex] = eye;
      const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 6), pupilMat);
      pupil.position.set(ex, 0.7, 0.42); group.add(pupil);
      group.userData['pupil_'+ex] = pupil;
    }
  }

  group.userData.colorName = colorName;
  group.userData.bodyMat = body.material;
  group.userData.cabinMat = cabin.material;
  return group;
}

function setCarBlocked(car, blocked) {
  car.userData.tappable = !blocked;
  car.userData.blocked = blocked;
  // dim materials when blocked
  const bodyMat = car.userData.bodyMat;
  const cabinMat = car.userData.cabinMat;
  bodyMat.transparent = blocked;
  cabinMat.transparent = blocked;
  bodyMat.opacity = blocked ? 0.55 : 1.0;
  cabinMat.opacity = blocked ? 0.55 : 1.0;
}

function shadeColor(hex, pct) {
  const r = (hex>>16)&0xff, g = (hex>>8)&0xff, b = hex&0xff;
  const t = pct < 0 ? 0 : 255, p = Math.abs(pct);
  return ((Math.round((t-r)*p)+r) << 16) | ((Math.round((t-g)*p)+g) << 8) | (Math.round((t-b)*p)+b);
}

// ===== TRUCK =====
function makeTruck(colorName) {
  const group = new THREE.Group();
  const color = COLORS[colorName];
  const slotW = 0.85, totalW = slotW * TRUCK_CAPACITY;

  const bed = new THREE.Mesh(
    new THREE.BoxGeometry(totalW + 0.4, 0.35, 1.55),
    new THREE.MeshLambertMaterial({ color: shadeColor(color, -0.45) })
  );
  bed.position.y = 0.4; bed.castShadow = true; group.add(bed);

  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(totalW + 0.45, 0.12, 0.05),
    new THREE.MeshBasicMaterial({ color })
  );
  stripe.position.set(0, 0.55, 0.8); group.add(stripe);
  const stripe2 = stripe.clone(); stripe2.position.z = -0.8; group.add(stripe2);

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.1, 0.85, 1.35),
    new THREE.MeshLambertMaterial({ color: 0x6b6b78 })
  );
  cabin.position.set(-(totalW/2 + 0.7), 0.65, 0); cabin.castShadow = true; group.add(cabin);

  const wind = new THREE.Mesh(
    new THREE.BoxGeometry(0.95, 0.4, 1.25),
    new THREE.MeshLambertMaterial({ color: 0x222230 })
  );
  wind.position.set(-(totalW/2 + 0.7), 1.0, 0); group.add(wind);

  const wMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const wGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.12, 14);
  for (const x of [-(totalW/2 + 1.05), -(totalW/2 + 0.35), -0.4, totalW/2 - 0.2]) {
    for (const z of [-0.6, 0.6]) {
      const w = new THREE.Mesh(wGeo, wMat);
      w.rotation.z = Math.PI/2; w.position.set(x, 0.22, z); group.add(w);
    }
  }

  // slots
  const slots = [];
  for (let i = 0; i < TRUCK_CAPACITY; i++) {
    const x = -totalW/2 + slotW/2 + i * slotW;
    const marker = new THREE.Mesh(
      new THREE.BoxGeometry(slotW * 0.85, 0.05, 1.25),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 })
    );
    marker.position.set(x, 0.6, 0); group.add(marker);

    const outline = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(slotW * 0.85, 0.06, 1.25)),
      new THREE.LineBasicMaterial({ color: 0xffffff })
    );
    outline.position.set(x, 0.6, 0); group.add(outline);

    slots.push({ localX: x, marker, outline, filled: false, car: null });
  }

  group.userData.colorName = colorName;
  group.userData.slots = slots;
  return group;
}

// ===== RESERVE =====
function makeReserveArea() {
  for (let i = 0; i < RESERVE_SLOTS; i++) {
    const x = (i - (RESERVE_SLOTS - 1)/2) * 1.05;
    const z = 1.2;
    const pad = new THREE.Mesh(
      new THREE.BoxGeometry(0.95, 0.04, 1.45),
      new THREE.MeshLambertMaterial({ color: 0xf2e6d8 })
    );
    pad.position.set(x, 0.02, z); pad.receiveShadow = true;
    scene.add(pad);

    const outline = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(0.95, 0.05, 1.45)),
      new THREE.LineDashedMaterial({ color: 0x444466, dashSize: 0.2, gapSize: 0.1 })
    );
    outline.computeLineDistances();
    outline.position.set(x, 0.05, z); scene.add(outline);

    reserveSlots.push({ x, z, pad, outline, car: null });
  }
  reserveBuilt = true;
}

// ===== LEVEL LOAD =====
function loadLevel(idx) {
  // clear cars from columns
  for (const car of allCars) scene.remove(car);
  allCars = [];
  columns = [];
  if (!reserveBuilt) makeReserveArea();
  for (const r of reserveSlots) { if (r.car) scene.remove(r.car); r.car = null; }

  for (let i = 0; i < ACTIVE_TRUCKS; i++) {
    if (activeTrucks[i]) { scene.remove(activeTrucks[i]); activeTrucks[i] = null; }
  }
  animations = [];
  gameLocked = false;
  hideEnd();
  hideTutorial();
  stopTimer();

  level = idx;
  const data = LEVELS[idx];
  document.getElementById('lvl').textContent = `LEVEL ${idx + 1}`;
  updateProgressDots(0);

  // build truck queue (the 3 colors in order)
  truckQueue = [...data.truckColors];
  trucksDone = 0;

  // place cars in columns. Each column is front-to-back.
  // Layout: cols centered at x = (c - (n-1)/2) * spacingX
  //          rows: front = -2 (close to reserve), back = -2 - (rows-1)*spacingZ
  const cols = data.grid.length;
  const spacingX = 1.5;
  const spacingZ = 1.55;
  const frontZ = -2.0;

  for (let c = 0; c < cols; c++) {
    const colCars = [];
    const colData = data.grid[c];
    const rowCount = colData.length;
    for (let r = 0; r < rowCount; r++) {
      const colorName = colData[r];
      const car = makeCar(colorName, true);
      car.position.set(
        (c - (cols - 1)/2) * spacingX,
        0,
        frontZ - r * spacingZ
      );
      car.userData.column = c;
      car.userData.rowInColumn = r;
      car.userData.location = 'grid';
      // only the front (r=0) is tappable
      setCarBlocked(car, r > 0);
      scene.add(car);
      allCars.push(car);
      colCars.push(car);
    }
    columns.push(colCars);
  }

  // spawn 3 active trucks
  for (let i = 0; i < ACTIVE_TRUCKS; i++) spawnTruckAt(i);

  // start timer
  timerSeconds = data.timer;
  startTimer();

  setTimeout(() => showTutorial(), 700);
}

function spawnTruckAt(stationIndex) {
  if (truckQueue.length === 0) { activeTrucks[stationIndex] = null; return; }
  const colorName = truckQueue.shift();
  const truck = makeTruck(colorName);
  const targetX = TRUCK_X[stationIndex];
  truck.position.set(targetX, 0, 9);
  truck.userData.station = stationIndex;
  scene.add(truck);
  activeTrucks[stationIndex] = truck;

  const t0 = clock.getElapsedTime();
  const dur = 0.55;
  const startZ = 9, targetZ = 5.0;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeOutCubic(t);
      truck.position.z = startZ + (targetZ - startZ) * e;
      if (t >= 1) { truck.position.z = targetZ; return true; }
      return false;
    }
  });
}

// ===== TIMER =====
function startTimer() {
  stopTimer();
  timerStartTime = performance.now();
  updateTimerUI(timerSeconds);
  timerInterval = setInterval(() => {
    if (gameLocked) return;
    const elapsed = (performance.now() - timerStartTime) / 1000;
    const left = Math.max(0, timerSeconds - elapsed);
    updateTimerUI(left);
    if (left <= 0) {
      stopTimer();
      gameLocked = true;
      lose('time ran out');
    }
  }, 100);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerUI(seconds) {
  const el = document.getElementById('timer');
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  el.textContent = `${m}:${String(s).padStart(2, '0')}`;
  el.classList.toggle('warn', seconds <= 20 && seconds > 10);
  el.classList.toggle('crit', seconds <= 10);
}

function timeLeft() {
  if (!timerInterval) return timerSeconds;
  const elapsed = (performance.now() - timerStartTime) / 1000;
  return Math.max(0, timerSeconds - elapsed);
}

// ===== TUTORIAL =====
function showTutorial() {
  if (gameLocked) return;
  for (const car of allCars) {
    if (!car.userData.tappable) continue;
    const truck = findTruckWithSpace(car.userData.colorName);
    if (truck) {
      tutorialHand.visible = true;
      tutorialHand.position.set(car.position.x, 1.3, car.position.z);
      return;
    }
  }
  hideTutorial();
}
function hideTutorial() { tutorialHand.visible = false; }

// ===== INPUT =====
function bindInput() {
  renderer.domElement.addEventListener('pointerdown', onTap);
}

function onTap(e) {
  if (gameLocked) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const tappables = [];
  for (const c of allCars) if (c.userData.tappable && c.userData.location === 'grid') tappables.push(c);
  for (const r of reserveSlots) if (r.car && r.car.userData.tappable) tappables.push(r.car);

  const hits = raycaster.intersectObjects(tappables, true);
  if (!hits.length) return;
  let car = hits[0].object;
  while (car.parent && !car.userData.tappable) car = car.parent;
  if (!car.userData.tappable) return;
  routeCar(car);
}

// ===== CORE: route car =====
function findTruckWithSpace(colorName) {
  for (const t of activeTrucks) {
    if (!t) continue;
    if (t.userData.colorName !== colorName) continue;
    const free = t.userData.slots.find(s => !s.filled);
    if (free) return { truck: t, slot: free };
  }
  return null;
}

function findFreeReserveSlot() {
  return reserveSlots.find(r => !r.car) || null;
}

function routeCar(car) {
  hideTutorial();
  car.userData.tappable = false;

  const colorName = car.userData.colorName;
  const match = findTruckWithSpace(colorName);

  if (match) {
    if (car.userData.location === 'reserve') {
      const r = reserveSlots.find(rs => rs.car === car);
      if (r) r.car = null;
    } else {
      removeFromColumn(car);
    }
    car.userData.location = 'truck';
    flyCarToSlot(car, match.truck, match.slot, () => {
      checkTruckFilled(match.truck);
      flushReserveToTrucks();
      if (!gameLocked) setTimeout(() => showTutorial(), 200);
    });
  } else {
    const reserve = findFreeReserveSlot();
    if (!reserve) {
      if (car.userData.location === 'grid') {
        flashCarRed(car);
        gameLocked = true;
        setTimeout(() => lose('reserve full · no truck of this color'), 700);
        return;
      } else {
        car.userData.tappable = true;
        return;
      }
    }
    if (car.userData.location === 'grid') removeFromColumn(car);
    else {
      const r = reserveSlots.find(rs => rs.car === car);
      if (r) r.car = null;
    }
    car.userData.location = 'reserve';
    reserve.car = car;
    flyCarToReserve(car, reserve, () => {
      car.userData.tappable = true;
      if (checkReserveDeadlock()) return;
      if (!gameLocked) setTimeout(() => showTutorial(), 200);
    });
  }
}

// LOSE if reserve is full (5 cars) and none of them can flow to an active truck.
// In practice, auto-flow already moves matching cars out, so a full reserve
// always means 5 stuck cars → game over.
function checkReserveDeadlock() {
  const cars = reserveSlots.filter(r => r.car).map(r => r.car);
  if (cars.length < RESERVE_SLOTS) return false;
  for (const c of cars) {
    if (findTruckWithSpace(c.userData.colorName)) return false;
  }
  // mark them red briefly to communicate the failure cause, then lose
  for (const c of cars) flashCarRed(c);
  gameLocked = true;
  setTimeout(() => lose('5 wrong-color cars in reserve'), 700);
  return true;
}

// when a car leaves the grid, the next one in its column becomes tappable & moves forward
function removeFromColumn(car) {
  const col = car.userData.column;
  const colArr = columns[col];
  const idx = colArr.indexOf(car);
  if (idx === -1) return;
  colArr.splice(idx, 1);
  // recompute positions: each remaining car at index i should be at row i (front-to-back)
  for (let i = 0; i < colArr.length; i++) {
    const c = colArr[i];
    c.userData.rowInColumn = i;
    // animate forward to new z
    const cols = LEVELS[level].grid.length;
    const spacingX = 1.5, spacingZ = 1.55, frontZ = -2.0;
    const newZ = frontZ - i * spacingZ;
    if (Math.abs(c.position.z - newZ) > 0.01) slideCarTo(c, c.position.x, newZ);
    setCarBlocked(c, i > 0);
  }
}

function slideCarTo(car, targetX, targetZ) {
  const t0 = clock.getElapsedTime();
  const startX = car.position.x, startZ = car.position.z;
  const dur = 0.4;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeInOutCubic(t);
      car.position.x = startX + (targetX - startX) * e;
      car.position.z = startZ + (targetZ - startZ) * e;
      if (t >= 1) { car.position.set(targetX, 0, targetZ); return true; }
      return false;
    }
  });
}

function flushReserveToTrucks() {
  for (const r of reserveSlots) {
    if (!r.car) continue;
    const car = r.car;
    const match = findTruckWithSpace(car.userData.colorName);
    if (match) {
      r.car = null;
      car.userData.tappable = false;
      car.userData.location = 'truck';
      flyCarToSlot(car, match.truck, match.slot, () => {
        checkTruckFilled(match.truck);
        flushReserveToTrucks();
      });
      return;
    }
  }
}

function checkTruckFilled(truck) {
  if (truck.userData.leaving) return;          // guard against multi-trigger (each car arrival re-checks)
  const allFilled = truck.userData.slots.every(s => s.filled);
  if (!allFilled) return;
  truck.userData.leaving = true;
  const station = truck.userData.station;
  activeTrucks[station] = null;
  trucksDone++;
  updateProgressDots(trucksDone);

  // celebrate this truck
  showPopup(`PERFECT! ${trucksDone}/3`);
  // truck shake & drive away
  truckCelebrateAndLeave(truck, () => {
    // no more trucks in queue and all 3 done → win
    if (trucksDone >= 3) {
      win();
    } else {
      if (truckQueue.length > 0) {
        spawnTruckAt(station);
        setTimeout(() => flushReserveToTrucks(), 500);
      } else {
        setTimeout(() => flushReserveToTrucks(), 200);
      }
    }
  });
}

function truckCelebrateAndLeave(truck, onDone) {
  const t0 = clock.getElapsedTime();
  const startX = truck.position.x;
  const dur = 0.45;
  // small happy bounce first
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      truck.position.y = Math.sin(t * Math.PI) * 0.25;
      const s = 1 + Math.sin(t * Math.PI) * 0.08;
      truck.scale.setScalar(s);
      if (t >= 1) {
        truck.position.y = 0; truck.scale.setScalar(1);
        // then drive off to the right
        driveOffRight(truck, startX, onDone);
        return true;
      }
      return false;
    }
  });
}

function driveOffRight(truck, startX, onDone) {
  const t0 = clock.getElapsedTime();
  const dur = 0.85;
  const dist = 28;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = t * t;                     // easeInQuad — visibly accelerating
      truck.position.x = startX + dist * e;
      truck.rotation.z = -Math.sin(t * Math.PI) * 0.18; // strong tilt back (wheelie)
      truck.position.y = Math.sin(t * Math.PI) * 0.1;   // slight lift on launch
      if (t >= 1) {
        scene.remove(truck);
        if (onDone) onDone();
        return true;
      }
      return false;
    }
  });
}

function showPopup(text) {
  const p = document.getElementById('popup');
  p.textContent = text;
  p.classList.remove('hide');
  p.classList.add('show');
  setTimeout(() => {
    p.classList.remove('show');
    p.classList.add('hide');
    setTimeout(() => p.classList.remove('hide'), 350);
  }, 700);
}

function updateProgressDots(n) {
  const dots = document.querySelectorAll('#progress .dot');
  dots.forEach((d, i) => d.classList.toggle('done', i < n));
}

// ===== ANIMATIONS =====
function flyCarToSlot(car, truck, slot, onDone) {
  slot.filled = true;
  slot.car = car;
  slot.marker.material.opacity = 0;

  const startPos = car.position.clone();
  const targetWorld = new THREE.Vector3(slot.localX, 0.6, 0);
  truck.localToWorld(targetWorld);

  const peakY = 1.8;
  const t0 = clock.getElapsedTime();
  const dur = 0.6;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeInOutCubic(t);
      car.position.x = startPos.x + (targetWorld.x - startPos.x) * e;
      car.position.z = startPos.z + (targetWorld.z - startPos.z) * e;
      car.position.y = startPos.y + (targetWorld.y - startPos.y) * e + Math.sin(t * Math.PI) * peakY;
      car.rotation.y = (targetWorld.x < startPos.x ? -1 : 1) * Math.sin(t * Math.PI) * 0.3;
      if (t >= 1) {
        car.position.copy(targetWorld);
        car.rotation.y = 0;
        bounce(car, 0.18, 0.25);
        if (onDone) onDone();
        return true;
      }
      return false;
    }
  });
}

function flyCarToReserve(car, reserve, onDone) {
  const startPos = car.position.clone();
  const target = new THREE.Vector3(reserve.x, 0, reserve.z);
  const peakY = 1.4;
  const t0 = clock.getElapsedTime();
  const dur = 0.5;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      const e = easeInOutCubic(t);
      car.position.x = startPos.x + (target.x - startPos.x) * e;
      car.position.z = startPos.z + (target.z - startPos.z) * e;
      car.position.y = startPos.y + Math.sin(t * Math.PI) * peakY;
      if (t >= 1) {
        car.position.set(target.x, 0, target.z);
        bounce(car, 0.1, 0.2);
        if (onDone) onDone();
        return true;
      }
      return false;
    }
  });
}

function bounce(obj, amt, dur) {
  const t0 = clock.getElapsedTime();
  const startY = obj.position.y;
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      obj.position.y = startY + Math.sin(t * Math.PI) * amt;
      if (t >= 1) { obj.position.y = startY; return true; }
      return false;
    }
  });
}

function flashCarRed(car) {
  const t0 = clock.getElapsedTime();
  const startX = car.position.x;
  const dur = 0.5;
  const bodyMat = car.userData.bodyMat;
  const orig = bodyMat.color.getHex();
  bodyMat.color.setHex(0xff2020);
  animations.push({
    update: (now) => {
      const t = Math.min((now - t0)/dur, 1);
      car.position.x = startX + Math.sin(t * 30) * 0.15 * (1 - t);
      if (t >= 1) {
        car.position.x = startX;
        bodyMat.color.setHex(orig);
        return true;
      }
      return false;
    }
  });
}

function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t) { return t*t*t; }

// ===== UI =====
function showInstruction(text, ms = 2500) {
  const el = document.getElementById('instruction');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

const endEl = document.getElementById('endscreen');
const endTitleEl = document.getElementById('endTitle');
const endSubEl = document.getElementById('endSub');
const nextBtn = document.getElementById('nextBtn');
const retryBtn = document.getElementById('retryBtn');
const statTimeEl = document.getElementById('statTime');
const statTrucksEl = document.getElementById('statTrucks');

function fmtTime(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function win() {
  gameLocked = true;
  stopTimer();
  const tLeft = timeLeft();
  endTitleEl.textContent = 'YOU WIN!';
  endSubEl.textContent = level + 1 < LEVELS.length ? 'all 3 trucks delivered — next level?' : 'all levels cleared!';
  statTimeEl.textContent = fmtTime(tLeft);
  statTrucksEl.textContent = `${trucksDone}/3`;
  nextBtn.textContent = level + 1 < LEVELS.length ? 'NEXT LEVEL' : 'PLAY AGAIN';
  endEl.className = 'show win';
  fireConfetti(120);
}

function lose(reason) {
  gameLocked = true;
  stopTimer();
  endTitleEl.textContent = 'YOU FAIL!';
  endSubEl.textContent = reason || 'try again';
  statTimeEl.textContent = '0:00';
  statTrucksEl.textContent = `${trucksDone}/3`;
  nextBtn.textContent = 'TRY AGAIN';
  endEl.className = 'show lose';
}

function hideEnd() { endEl.className = ''; clearConfetti(); }

nextBtn.addEventListener('click', () => {
  if (endEl.classList.contains('win') && level + 1 < LEVELS.length) loadLevel(level + 1);
  else loadLevel(level);
});
retryBtn.addEventListener('click', () => loadLevel(level));

// ===== CONFETTI =====
const CONFETTI_COLORS = ['#ff2a2a','#ffa000','#5ee85e','#3da6ff','#b24dff','#ffd23a','#ff5fa2'];
function fireConfetti(count) {
  const wrap = document.getElementById('confetti');
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    piece.style.animationDuration = (2.2 + Math.random() * 2) + 's';
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    piece.style.width = (6 + Math.random()*8) + 'px';
    piece.style.height = (10 + Math.random()*8) + 'px';
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}
function clearConfetti() {
  document.getElementById('confetti').innerHTML = '';
}

// ===== LOOP =====
function animate() {
  requestAnimationFrame(animate);
  const now = clock.getElapsedTime();
  animations = animations.filter(a => !a.update(now));
  if (tutorialHand.visible) {
    tutorialHand.position.y = 1.3 + Math.sin(now * 4) * 0.15;
  }
  // bob the front (tappable) cars subtly
  for (const car of allCars) {
    if (car.userData.tappable && car.userData.location === 'grid') {
      car.position.y = Math.abs(Math.sin(now * 2 + car.userData.column * 0.7)) * 0.04;
    }
  }
  renderer.render(scene, camera);
}

// boot AFTER all top-level consts (endEl, etc.) are initialized
if (window.__skipGate) bootGame();
