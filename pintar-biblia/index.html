  #cartaz .ornamento{ color:var(--ouro); font-size:13px; letter-spacing:.5em; }

  @keyframes surgir{ from{opacity:0; transform:translateY(8px) scale(.98);} to{opacity:1; transform:none;} }

  button.btn{

<script>
"use strict";

/* ============================================================
   TOOLKIT DE PIXEL ART — desenho em grade com cores hex
   0 = célula vazia (papel, não pintável)
   ============================================================ */
function G(w,h){ return {w,h, d:new Array(w*h).fill(0)}; }
function inb(g,x,y){ return x>=0&&x<g.w&&y>=0&&y<g.h; }
function px(g,x,y,c){ if(inb(g,x,y)) g.d[y*g.w+x]=c; }
function get(g,x,y){ return inb(g,x,y)? g.d[y*g.w+x] : 0; }
function rect(g,x,y,w,h,c){ for(let j=0;j<h;j++) for(let i=0;i<w;i++) px(g,x+i,y+j,c); }
function hline(g,x,y,len,c){ for(let i=0;i<len;i++) px(g,x+i,y,c); }
function vline(g,x,y,len,c){ for(let i=0;i<len;i++) px(g,x,y+i,c); }
function ellipse(g,cx,cy,rx,ry,c){
  for(let y=-ry;y<=ry;y++) for(let x=-rx;x<=rx;x++){
    if((x*x)/(rx*rx+.0001)+(y*y)/(ry*ry+.0001) <= 1.04) px(g,cx+x,cy+y,c);
  }
}
function disc(g,cx,cy,r,c){ ellipse(g,cx,cy,r,r,c); }
/* raio triangular (estrela / sol): da base (largura 2*hb) afina até a ponta */
function ray(g,cx,cy,len,hb,dir,c){
  for(let i=0;i<=len;i++){
    const hw=Math.round(hb*(1-i/len));
    for(let j=-hw;j<=hw;j++){
      if(dir==='u') px(g,cx+j,cy-i,c);
      else if(dir==='d') px(g,cx+j,cy+i,c);
      else if(dir==='l') px(g,cx-i,cy+j,c);
      else px(g,cx+i,cy+j,c);
    }
  }
}
/* triângulo preenchido (varredura por linha) */
function tri(g,ax,ay,bx,by,cxp,cyp,c){
  const minY=Math.min(ay,by,cyp), maxY=Math.max(ay,by,cyp);
  const E=(x0,y0,x1,y1,y,o)=>{ if(y0===y1) return; if((y0<=y&&y<=y1)||(y1<=y&&y<=y0)){ const t=(y-y0)/(y1-y0); o.push(x0+(x1-x0)*t); } };
  for(let y=minY;y<=maxY;y++){ const xs=[]; E(ax,ay,bx,by,y,xs); E(bx,by,cxp,cyp,y,xs); E(cxp,cyp,ax,ay,y,xs);
    if(xs.length){ const a=Math.round(Math.min(...xs)), b=Math.round(Math.max(...xs)); for(let x=a;x<=b;x++) px(g,x,y,c); } }
}
/* carimbo a partir de linhas de texto, usando um mapa char->cor */
function stamp(g,ox,oy,rows,map){
  for(let j=0;j<rows.length;j++){ const r=rows[j];
    for(let i=0;i<r.length;i++){ const ch=r[i]; if(ch in map && map[ch]!==0) px(g,ox+i,oy+j,map[ch]); }
  }
}
/* espelha a metade esquerda para a direita (simetria vertical) */
function mirrorX(g){ for(let y=0;y<g.h;y++) for(let x=0;x<Math.floor(g.w/2);x++){ const c=get(g,x,y); if(c) px(g,g.w-1-x,y,c); } }
/* espelha metade superior para baixo (simetria horizontal) */
function mirrorY(g){ for(let x=0;x<g.w;x++) for(let y=0;y<Math.floor(g.h/2);y++){ const c=get(g,x,y); if(c) px(g,x,g.h-1-y,c); } }
/* contorno automático: pinta de 'oc' as células vazias vizinhas (8-viz) de qualquer cor */
function outline(g,oc){
  const s=g.d.slice();
  for(let y=0;y<g.h;y++) for(let x=0;x<g.w;x++){
    if(s[y*g.w+x]!==0) continue;
    let near=false;
    for(let dy=-1;dy<=1&&!near;dy++) for(let dx=-1;dx<=1;dx++){
      if(!dx&&!dy) continue; const nx=x+dx,ny=y+dy;
      if(nx<0||nx>=g.w||ny<0||ny>=g.h) continue;
      const v=s[ny*g.w+nx]; if(v!==0 && v!==oc){ near=true; break; }
    }
    if(near) g.d[y*g.w+x]=oc;
  }
}

/* converte grade de hex -> {w,h,palette,data} com números por luminância */
function indexize(g){
  const set=[]; const seen=new Set();
  for(const c of g.d){ if(c!==0 && !seen.has(c)){ seen.add(c); set.push(c); } }
  const lum=hex=>{ const r=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return .299*r+.587*gg+.114*b; };
  set.sort((a,b)=>lum(a)-lum(b));
  const map=new Map(); set.forEach((c,i)=>map.set(c,i+1));
  const data=g.d.map(c=> c===0?0:map.get(c));
  return { w:g.w, h:g.h, palette:[null,...set], data };
}

/* ============================================================
   PALETA DE CORES NOMEADAS
   ============================================================ */
const INK='#3b2a17';
const OUROH='#ffe9a8', OURO='#f3c44d', OUROD='#c6881b', OURODD='#8c5e12';
const VERMH='#f0796a', VERM='#d6453f', VERMD='#9e2630';
const CEUH='#dff1fb', CEU='#a9def4', CEUD='#5aa6d8', AGUA='#3a82b8', AGUAD='#1f5580';
const VERDH='#abe07a', VERD='#5aa83e', VERDD='#356b22';
const BRANCO='#fbf7ea', BRANS='#dcd4c0', BRAND='#b8b0a0';
const CINZ='#bfc4c9', CINZD='#828a90', CINZDD='#525960';
const MADH='#caa066', MAD='#9c6b35', MADD='#5e3a18';
const PELE='#f3c590', PELED='#cf9a63';
const ROXO='#9a63c4', ROXOD='#5d3a86';
const ROSA='#f4a6c2', ROSAD='#d77199';
const LARJ='#f4923b', LARJD='#d4661c';
const CREM='#f4ead0', CREMD='#d8c79b';

/* ============================================================
   AS 12 OBRAS — funções de desenho
   ============================================================ */

// 1) A CRUZ ---------------------------------------------------
function imgCruz(){
  const g=G(15,18);
  rect(g,6,1,4,16,OURO);
  rect(g,1,5,13,4,OURO);
  // brilho (topo/esq)
  hline(g,6,1,4,OUROH); vline(g,6,1,16,OUROH);
  hline(g,1,5,13,OUROH); vline(g,1,5,4,OUROH);
  // sombra (base/dir)
  hline(g,6,16,4,OUROD); vline(g,9,1,16,OUROD);
  hline(g,1,8,13,OUROD); vline(g,13,5,4,OUROD);
  // núcleo
  rect(g,7,9,2,7,OURO); rect(g,7,6,2,2,OURO);
  outline(g,INK);
  return g;
}

// 2) PEIXE (Ichthys) -----------------------------------------
function imgPeixe(){
  const g=G(22,13);
  ellipse(g,9,6,7,4,CEUD);           // corpo
  // cauda à direita
  for(let i=0;i<=5;i++){ const hw=i; for(let j=-hw;j<=hw;j++) px(g,16+i,6+j,CEUD); }
  px(g,21,6,0); px(g,20,6,0);        // recorte da cauda
  // brilho na barriga superior / sombra embaixo
  for(let x=3;x<=15;x++){ px(g,x,3,CEUH); }
  for(let x=4;x<=15;x++){ px(g,x,9,AGUA); }
  // barbatana de cima e de baixo
  stamp(g,8,1,["####"],{ '#':CEU });
  stamp(g,8,11,["####"],{ '#':AGUA });
  // olho na frente (esq)
  ellipse(g,5,5,1,1,BRANCO); px(g,5,5,INK);
  // boca
  px(g,2,6,INK);
  outline(g,INK);
  return g;
}

// 3) CORAÇÃO com cruz ----------------------------------------
function imgCoracao(){
  const g=G(17,16);
  for(let y=0;y<g.h;y++) for(let x=0;x<g.w;x++){
    const X=(x-8)/6.3, Y=(11.3-y)/6.3;
    const v=Math.pow(X*X+Y*Y-1,3) - X*X*Y*Y*Y;
    if(v<=0) px(g,x,y,VERM);
  }
  // sombra base-direita
  for(let y=0;y<g.h;y++) for(let x=0;x<g.w;x++){ if(get(g,x,y)===VERM && (x>9||y>10)) px(g,x,y,VERMD); }
  // brilho lóbulo esq
  stamp(g,3,3,["##","# "],{ '#':VERMH });
  // cruzinha dourada no centro
  rect(g,8,6,1,5,OURO); rect(g,7,7,3,1,OURO);
  px(g,8,6,OUROH);
  outline(g,INK);
  return g;
}

// 4) ESTRELA DE BELÉM ----------------------------------------
function imgEstrela(){
  const g=G(19,21);
  const cx=9, cy=8;

}

const $=id=>document.getElementById(id);
function pintaCanvasCompleto(cv, o, scale){
  const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const s=scale; cv.width=o.w*s; cv.height=o.h*s;
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let y=0;y<o.h;y++) for(let x=0;x<o.w;x++){ const t=o.data[y*o.w+x]; if(!t) continue;
    ctx.fillStyle=o.palette[t]; ctx.fillRect(x*s,y*s,s,s); }
}
function montarGaleria(){
  const grade=$('grade-galeria'); grade.innerHTML='';
  OBRAS.forEach(o=>{
    const painted=progDe(o);
    const feitos=painted.reduce((a,c)=>a+c,0);
    const pct=Math.round(feitos/o.total*100);
    const completo = SAVE.done[o.id] || feitos===o.total;
    const card=document.createElement('div');
    card.className='quadro'+(completo?' feito':'');
    const niv='◆'.repeat(o.nivel)+'◇'.repeat(3-o.nivel);
    card.innerHTML=`<div class="selo-ok">✓</div><div class="mini"><canvas></canvas></div>
      <div class="nome">${o.nome}</div>
      <div class="nivel">${niv}</div>
      <div class="barra"><i style="width:${completo?100:pct}%"></i></div>`;
    const cv=card.querySelector('canvas');
    // miniatura: arte completa (prévia) ou progresso? mostramos prévia completa em tom suave se não feito
    pintaCanvasCompleto(cv, o, 6);
    if(!completo){ cv.style.filter='grayscale(.35) opacity(.92)'; }
    card.onclick=()=>abrirObra(o);
    grade.appendChild(card);
  });
}

/* ============================================================
   MOTOR DO JOGO
   ============================================================ */
const canvas=$('tela'); const cx2=canvas.getContext('2d');
let cur=null, painted=null, sel=0, feitos=0;
let view={scale:1, ox:0, oy:0, min:1, max:1};
let dpr=Math.min(window.devicePixelRatio||1, 2.5);

function abrirObra(o){
  cur=o; painted=progDe(o); feitos=painted.reduce((a,c)=>a+c,0); sel=0;
  $('telaGaleria').style.display='none';
  $('jogo').classList.add('ativo');
  $('tituloJogo').firstChild.textContent=o.nome;
  $('subJogo').textContent=o.ref;
  montarPaleta();
  resize(); ajustar();
  // seleciona a primeira cor incompleta
  selecionarPrimeira();
  desenhar(); atualizarPct();
}
function voltarGaleria(){
  $('jogo').classList.remove('ativo');
  $('telaGaleria').style.display='flex';
  $('veu').classList.remove('aberto');
  montarGaleria();
}

function pintadosDaCor(i){ let n=0; for(let k=0;k<cur.data.length;k++) if(cur.data[k]===i && painted[k]) n++; return n; }

function montarPaleta(){
  const pal=$('paleta'); pal.innerHTML='';
  for(let i=1;i<cur.palette.length;i++){
    const t=document.createElement('div');
    t.className='tinta'; t.dataset.i=i;
    t.style.background=cur.palette[i];
    t.style.color = corContraste(cur.palette[i]);
    t.innerHTML=`${i}<span class="resta"></span>`;
    t.onclick=()=>{ sel=i; refreshPaleta(); desenhar(); };
    pal.appendChild(t);
  }
  refreshPaleta();
}
function refreshPaleta(){
  const pal=$('paleta');
  [...pal.children].forEach(t=>{
    const i=+t.dataset.i;
    const resta=cur.cont[i]-pintadosDaCor(i);
    t.querySelector('.resta').textContent=resta;
    t.classList.toggle('sel', i===sel);
    t.classList.toggle('pronta', resta<=0);
  });
}
function selecionarPrimeira(){
  for(let i=1;i<cur.palette.length;i++){ if(cur.cont[i]-pintadosDaCor(i)>0){ sel=i; break; } }
  refreshPaleta();
}
function corContraste(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (.299*r+.587*g+.114*b)>150 ? 'rgba(40,30,15,.85)' : 'rgba(255,250,235,.95)';
}

/* ---- canvas / view ---- */
function resize(){
  const palco=$('palco'); const w=palco.clientWidth, h=palco.clientHeight;
  canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  cx2.setTransform(dpr,0,0,dpr,0,0);
}
function ajustar(){
  const w=$('palco').clientWidth, h=$('palco').clientHeight;
  const pad=24;
  view.min=Math.min((w-pad)/cur.w, (h-pad)/cur.h);
  view.max=view.min*9;
  view.scale=view.min;
  view.ox=(w-cur.w*view.scale)/2;
  view.oy=(h-cur.h*view.scale)/2;
  desenhar();
}
function clampView(){
  const w=$('palco').clientWidth, h=$('palco').clientHeight;
  view.scale=Math.max(view.min, Math.min(view.max, view.scale));
  const iw=cur.w*view.scale, ih=cur.h*view.scale;
  const mx=Math.min(40, w*0.4), my=Math.min(40,h*0.4);
  if(iw<=w) view.ox=(w-iw)/2; else view.ox=Math.max(w-iw-mx, Math.min(mx, view.ox));
  if(ih<=h) view.oy=(h-ih)/2; else view.oy=Math.max(h-ih-my, Math.min(my, view.oy));
}
function desenhar(){
  const w=$('palco').clientWidth, h=$('palco').clientHeight;
  cx2.clearRect(0,0,w,h);
  const s=view.scale, ox=view.ox, oy=view.oy;
  cx2.imageSmoothingEnabled=false;
  cx2.textAlign='center'; cx2.textBaseline='middle';
  const fonte=`${Math.max(7,Math.floor(s*0.6))}px ui-monospace, Menlo, monospace`;
  for(let y=0;y<cur.h;y++) for(let x=0;x<cur.w;x++){
    const i=y*cur.w+x; const t=cur.data[i]; if(!t) continue;
    const X=ox+x*s, Y=oy+y*s;
    if(X>w||Y>h||X+s<0||Y+s<0) continue;
    if(painted[i]){
      cx2.fillStyle=cur.palette[t]; cx2.fillRect(X,Y,s+0.6,s+0.6);
    } else {
      const isSel=(t===sel);
      cx2.fillStyle= isSel? '#fbe7ad' : '#f4eedf';
      cx2.fillRect(X,Y,s,s);
      cx2.strokeStyle='rgba(60,45,25,0.13)'; cx2.lineWidth=1;
      cx2.strokeRect(X+0.5,Y+0.5,s-1,s-1);
      if(s>=9){
        cx2.fillStyle= isSel? '#7a4b12' : '#9c968a';
        cx2.font=fonte; cx2.fillText(t, X+s/2, Y+s/2+0.5);
      }
    }
  }
}
function atualizarPct(){ $('pctJogo').textContent=Math.round(feitos/cur.total*100)+'%'; }

/* ---- pintar ---- */
function celulaEm(clientX,clientY){
  const r=canvas.getBoundingClientRect();
  const lx=clientX-r.left, ly=clientY-r.top;
  const x=Math.floor((lx-view.ox)/view.scale), y=Math.floor((ly-view.oy)/view.scale);
  if(x<0||x>=cur.w||y<0||y>=cur.h) return null;
  return {x,y,i:y*cur.w+x};
}
let salvarTimer=null;
function pintarEm(clientX,clientY){
  const c=celulaEm(clientX,clientY); if(!c) return;
  const t=cur.data[c.i];
  if(!t || painted[c.i]) return;
  if(t!==sel) return;                 // só pinta a cor selecionada
  painted[c.i]=1; feitos++;
  // desenha só a célula (rápido)
  desenharCelula(c.x,c.y);
  refreshPaletaThrottle();
  atualizarPct();
  clearTimeout(salvarTimer); salvarTimer=setTimeout(()=>gravarProg(cur,painted),400);
  if(feitos===cur.total) setTimeout(concluir,300);
  else if(cur.cont[sel]-pintadosDaCor(sel)<=0){ selecionarPrimeira(); desenhar(); }
}
function desenharCelula(x,y){
  const s=view.scale, X=view.ox+x*s, Y=view.oy+y*s, t=cur.data[y*cur.w+x];
  cx2.fillStyle=cur.palette[t]; cx2.fillRect(X,Y,s+0.6,s+0.6);
}
let rpTimer=null;
function refreshPaletaThrottle(){ if(rpTimer) return; rpTimer=setTimeout(()=>{ rpTimer=null; refreshPaleta(); },120); }

/* ---- gestos: 1 dedo pinta, 2 dedos zoom/pan ---- */
const pts=new Map(); let pintando=false, gesto=null, moveu=false;
function rel(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top, cx:e.clientX, cy:e.clientY}; }
function gestoAtual(){ const a=[...pts.values()]; const dx=a[0].x-a[1].x, dy=a[0].y-a[1].y; return {cx:(a[0].x+a[1].x)/2, cy:(a[0].y+a[1].y)/2, d:Math.hypot(dx,dy)}; }

canvas.addEventListener('pointerdown',e=>{
  canvas.setPointerCapture(e.pointerId);
  pts.set(e.pointerId, rel(e));
  if(pts.size===1){ pintando=true; moveu=false; pintarEm(e.clientX,e.clientY); }
  else { pintando=false; gesto=gestoAtual(); }
});
canvas.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId)) return;
  pts.set(e.pointerId, rel(e));
  if(pts.size>=2){
    const ng=gestoAtual();
    if(gesto){
      const k=ng.d/(gesto.d||1);
      zoomEm(view.scale*k, ng.cx, ng.cy);
      view.ox+=ng.cx-gesto.cx; view.oy+=ng.cy-gesto.cy;
      clampView(); desenhar();
    }
    gesto=ng;
  } else if(pintando){
    pintarEm(e.clientX,e.clientY);
  }
});
function fim(e){
  pts.delete(e.pointerId);
  if(pts.size<2) gesto=null;
  if(pts.size===0) pintando=false;
}
canvas.addEventListener('pointerup',fim);
canvas.addEventListener('pointercancel',fim);
canvas.addEventListener('pointerleave',e=>{ if(pts.size<=1){ /* mantém */ } });

function zoomEm(novo, px, py){
  const r=canvas.getBoundingClientRect();
  const lx=px-r.left, ly=py-r.top;
  const ns=Math.max(view.min, Math.min(view.max, novo));
  const f=ns/view.scale;
  view.ox = lx-(lx-view.ox)*f;
  view.oy = ly-(ly-view.oy)*f;
  view.scale=ns;
}
$('btnMais').onclick=()=>{ const w=$('palco').clientWidth/2,h=$('palco').clientHeight/2; zoomEm(view.scale*1.4, w+canvas.getBoundingClientRect().left, h+canvas.getBoundingClientRect().top); clampView(); desenhar(); };
$('btnMenos').onclick=()=>{ const w=$('palco').clientWidth/2,h=$('palco').clientHeight/2; zoomEm(view.scale*0.72, w+canvas.getBoundingClientRect().left, h+canvas.getBoundingClientRect().top); clampView(); desenhar(); };
$('btnAjustar').onclick=ajustar;
canvas.addEventListener('wheel',e=>{ e.preventDefault(); zoomEm(view.scale*(e.deltaY<0?1.12:0.89), e.clientX, e.clientY); clampView(); desenhar(); },{passive:false});

/* ---- dica ---- */
$('btnDica').onclick=()=>{
  const livres=[]; for(let i=0;i<cur.data.length;i++) if(cur.data[i] && !painted[i]) livres.push(i);
  if(!livres.length) return;
  // prioriza a cor selecionada; senão qualquer uma
  let alvo=livres.filter(i=>cur.data[i]===sel);
  if(!alvo.length){ alvo=livres; sel=cur.data[alvo[Math.floor(Math.random()*alvo.length)]]; }
  const i=alvo[Math.floor(Math.random()*alvo.length)];
  painted[i]=1; feitos++;
  desenharCelula(i%cur.w, Math.floor(i/cur.w));
  refreshPaleta(); atualizarPct(); gravarProg(cur,painted);
  if(feitos===cur.total) setTimeout(concluir,300);
  else if(cur.cont[sel]-pintadosDaCor(sel)<=0){ selecionarPrimeira(); }
  desenhar();
};

/* ---- conclusão ---- */
function concluir(){
  SAVE.done[cur.id]=1; gravarProg(cur,painted);
  // anima zoom suave pro centro mostrando a arte limpa
  desenhar();
  setTimeout(()=>{
    pintaCanvasCompleto($('cartObra'), cur, 8);
    const cv=$('cartObra'); const m=Math.max(cv.width,cv.height); cv.style.width='160px'; cv.style.height=160*cv.height/cv.width+'px';
    $('cartTitulo').textContent=cur.nome+' ✦';
    $('cartVerso').textContent=cur.verso;
    $('cartRef').textContent=cur.ref;
    $('veu').classList.add('aberto');
  }, 500);
}
$('btnGaleria2').onclick=voltarGaleria;
$('btnProxima').onclick=()=>{
  const idx=OBRAS.indexOf(cur);
  // próxima não concluída, senão a seguinte
  let prox=null;
  for(let k=1;k<=OBRAS.length;k++){ const o=OBRAS[(idx+k)%OBRAS.length]; if(!SAVE.done[o.id]){ prox=o; break; } }
  if(!prox) prox=OBRAS[(idx+1)%OBRAS.length];
  $('veu').classList.remove('aberto');
  abrirObra(prox);
};
$('btnVoltar').onclick=voltarGaleria;

window.addEventListener('resize',()=>{ if($('jogo').classList.contains('ativo')){ resize(); clampView(); desenhar(); } });

/* ============================================================
   INÍCIO
   ============================================================ */
montarGaleria();
</script>
