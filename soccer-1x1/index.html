l Black',sans-serif;font-size:26px;font-weight:900;color:#fff;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.85),0 0 12px rgba(0,0,0,.6);z-index:3;min-width:24px;text-align:center}#battle-bar .bb-score.left-num{left:54px}#battle-bar .bb-score.right-num{right:54px}#battle-bar .bb-score.pop{animation:scorePop .55s cubic-bezier(.34,1.56,.64,1)}@keyframes scorePop{0%{transform:translateY(-50%) scale(1)}35%{transform:translateY(-50%) scale(1.55);text-shadow:0 0 24px rgba(255,255,255,.9),0 2px 4px rgba(0,0,0,.85)}100%{transform:translateY(-50%) scale(1)}}#battle-bar .bb-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:24px;background:radial-gradient(circle,#fff 30%,#bbb 100%);border:3px solid #0a0a0a;border-radius:50%;box-shadow:0 0 14px rgba(255,255,255,.6),0 2px 6px rgba(0,0,0,.55);z-index:5;transition:left .45s cubic-bezier(.25,.8,.25,1)}#title{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:3px;color:#ffefd9;text-shadow:0 2px 0 #000;background:rgba(0,0,0,.55);padding:4px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.14);white-space:nowrap}#banner{position:absolute;left:0;right:0;top:38%;text-align:center;font-size:54px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 4px 0 #000,0 0 14px rgba(255,255,255,.4);opacity:0;pointer-events:none}#banner.show{animation:bannerIn 1.4s ease-out forwards}#banner.danger{color:#ff3a2c;text-shadow:0 4px 0 #4a0000,0 0 18px rgba(255,58,44,.6)}#banner.success{color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 18px rgba(123,224,216,.7)}#banner.goal{color:#ffd23a;text-shadow:0 5px 0 #4a3000,0 0 22px rgba(255,210,58,.85);font-size:78px;letter-spacing:8px}@keyframes bannerIn{0%{opacity:0;transform:translateY(-30px) scale(.7)}20%{opacity:1;transform:translateY(0) scale(1.15)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(.95)}}#hint{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,.78);pointer-events:none;text-align:center;background:rgba(0,0,0,.55);padding:8px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.18);line-height:1.7;max-width:90%}#hint.hidden{opacity:0;transition:opacity .4s}#hint .key{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:4px;padding:1px 6px;margin:0 2px;font-weight:900}#joystick{position:absolute;inset:0;pointer-events:none}#joystick-base{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08) 0,rgba(255,255,255,.04) 70%,rgba(255,255,255,0) 100%);border:2px solid rgba(255,255,255,.32);transform:translate(-50%,-50%);opacity:0;transition:opacity .15s;box-shadow:0 0 18px rgba(0,0,0,.4)}#joystick-base.active{opacity:1}#joystick-thumb{position:absolute;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle,#5aa8ff 30%,#1a5acc 100%);border:2px solid #fff;transform:translate(-50%,-50%) scale(.6);opacity:0;transition:opacity .15s,transform .15s;box-shadow:0 0 14px rgba(90,168,255,.65),0 4px 8px rgba(0,0,0,.5)}#joystick-thumb.active{opacity:1;transform:translate(-50%,-50%) scale(1)}#mobile-hints{position:absolute;inset:0;pointer-events:none;display:none}#mobile-hints.visible{display:block}#mobile-hints.visible.hidden{opacity:0;transition:opacity .6s}#mobile-hints .zone{position:absolute;bottom:18%;width:96px;height:96px;border-radius:50%;border:2px dashed rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.85);text-align:center;line-height:1.3;background:rgba(0,0,0,.25);animation:mobileHintPulse 1.6s ease-in-out infinite}#mobile-hints .zone .icon{font-size:24px;margin-bottom:2px}#mobile-hints .zone.left{left:8%}#mobile-hints .zone.right{right:8%;animation-delay:.4s}@keyframes mobileHintPulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}#sling{position:absolute;inset:0;pointer-events:none}#sling-line{position:absolute;height:4px;background:linear-gradient(90deg,rgba(255,255,255,.2),rgba(255,255,255,.95));border-radius:2px;transform-origin:0 50%;opacity:0;transition:opacity .1s;box-shadow:0 0 8px rgba(255,255,255,.6)}#sling-line.active{opacity:1}#sling-dot{position:absolute;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#fff 30%,#aaa 100%);border:2px solid #0a0a0a;transform:translate(-50%,-50%) scale(.6);opacity:0;transition:opacity .12s,transform .12s;box-shadow:0 0 16px rgba(255,255,255,.7)}#sling-dot.active{opacity:1;transform:translate(-50%,-50%) scale(1)}#endcard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse at center,rgba(0,0,0,.7) 0,rgba(20,20,20,.95) 100%);padding:24px;z-index:60}#endcard.show{display:flex}#endcard .hd{font-size:60px;letter-spacing:4px;color:#7be0d8;text-shadow:0 4px 0 #003a36,0 0 28px rgba(123,224,216,.7);margin-bottom:14px}#endcard.loss .hd{color:#ff3030;text-shadow:0 4px 0 #4a0000,0 0 28px rgba(255,48,48,.7)}#endcard .sub{font-size:18px;color:#ffefd9;margin-bottom:36px;letter-spacing:1px}#endcard .cta{padding:20px 44px;background:linear-gradient(135deg,#7be0d8 0,#3aa8a0 100%);color:#001a18;border:none;font-family:Impact,'Arial Black',sans-serif;font-size:24px;letter-spacing:2px;cursor:pointer;border-radius:14px;box-shadow:0 0 32px rgba(123,224,216,.6),0 6px 0 #003a36;animation:ctapulse 1.2s ease-in-out infinite}#endcard.loss .cta{background:linear-gradient(135deg,#ff3030 0,#a01010 100%);color:#fff;box-shadow:0 0 32px rgba(255,48,48,.6),0 6px 0 #4a0000}@keyframes ctapulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}#endcard .cta-sub{font-size:13px;color:#ffefd9;margin-top:14px;letter-spacing:1px}#endcard .replay{margin-top:22px;paddi
